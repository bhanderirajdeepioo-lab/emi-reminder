<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · prepayment / foreclosure calculator -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />

  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="84" font-size="20" stroke="none" fill="#000">←</text>
  <text x="195" y="84" font-size="17" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Prepayment Calculator</text>

  <!-- loan selector -->
  <rect x="16" y="112" width="358" height="52" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="134" font-size="11" stroke="none" fill="#666">Select Loan</text>
  <text x="36" y="154" font-size="14" font-weight="600" stroke="none" fill="#000">SBI Home Loan  (₹32,450 EMI · 214 EMIs left)</text>
  <text x="358" y="142" font-size="16" text-anchor="end" stroke="none" fill="#666">▾</text>

  <!-- current status bar -->
  <rect x="16" y="172" width="358" height="60" rx="10" fill="#000" stroke="none" />
  <text x="36" y="196" font-size="11" stroke="none" fill="#aaa">Outstanding Balance</text>
  <text x="36" y="218" font-size="20" font-weight="700" stroke="none" fill="#fff">₹ 43,52,148</text>
  <text x="280" y="196" font-size="11" text-anchor="end" stroke="none" fill="#aaa">Months left</text>
  <text x="280" y="218" font-size="20" font-weight="700" text-anchor="end" stroke="none" fill="#fff">214</text>

  <!-- prepayment amount input -->
  <text x="16" y="258" font-size="12" font-weight="700" stroke="none" fill="#666">PREPAYMENT AMOUNT</text>
  <rect x="16" y="266" width="358" height="64" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="292" font-size="11" stroke="none" fill="#666">Amount</text>
  <text x="36" y="320" font-size="26" font-weight="700" stroke="none" fill="#000">₹ 5,00,000</text>
  <!-- keyboard icon -->
  <text x="350" y="308" font-size="18" text-anchor="end" stroke="none" fill="#ccc">⌨</text>

  <!-- prepayment type -->
  <text x="16" y="354" font-size="12" font-weight="700" stroke="none" fill="#666">PREPAYMENT TYPE</text>
  <rect x="16" y="362" width="358" height="44" rx="10" fill="#e6e6e6" stroke="none" />
  <rect x="18" y="364" width="112" height="40" rx="8" fill="#000" stroke="none" />
  <text x="74" y="389" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">One-time</text>
  <text x="195" y="389" font-size="12" text-anchor="middle" stroke="none" fill="#666">Monthly extra</text>
  <text x="324" y="389" font-size="12" text-anchor="middle" stroke="none" fill="#666">Annual</text>

  <!-- impact section -->
  <rect x="16" y="424" width="358" height="152" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="448" font-size="12" font-weight="700" stroke="none" fill="#666">IMPACT OF ₹5L PREPAYMENT</text>
  <!-- divider -->
  <line x1="36" y1="456" x2="362" y2="456" stroke="#f0f0f0" stroke-width="1" />
  <!-- before / after columns -->
  <text x="160" y="474" font-size="11" text-anchor="middle" stroke="none" fill="#666">Before</text>
  <text x="300" y="474" font-size="11" text-anchor="middle" stroke="none" fill="#666">After</text>
  <line x1="216" y1="462" x2="216" y2="564" stroke="#e5e5e0" stroke-width="1" />
  <!-- rows -->
  <text x="36" y="496" font-size="12" stroke="none" fill="#000">Months left</text>
  <text x="160" y="496" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#666">214</text>
  <text x="300" y="496" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">194</text>
  <text x="36" y="520" font-size="12" stroke="none" fill="#000">Total Interest</text>
  <text x="160" y="520" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#666">₹23.6L</text>
  <text x="300" y="520" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹17.2L</text>
  <text x="36" y="544" font-size="12" stroke="none" fill="#000">Tenure ends</text>
  <text x="160" y="544" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#666">Sep 2043</text>
  <text x="300" y="544" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Jan 2042</text>
  <!-- savings row highlighted -->
  <rect x="16" y="552" width="358" height="24" rx="0" fill="#f0f8f0" stroke="none" />
  <text x="36" y="568" font-size="12" font-weight="700" stroke="none" fill="#000">Interest saved</text>
  <rect x="248" y="554" width="112" height="20" rx="4" fill="#000" stroke="none" />
  <text x="304" y="568" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">₹6.4L saved!</text>

  <!-- choose outcome section -->
  <text x="16" y="604" font-size="12" font-weight="700" stroke="none" fill="#666">WHAT WOULD YOU PREFER?</text>
  <rect x="16" y="612" width="170" height="64" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <rect x="16" y="612" width="4" height="64" rx="2" fill="#000" stroke="none" />
  <text x="36" y="636" font-size="13" font-weight="700" stroke="none" fill="#000">Reduce Tenure</text>
  <text x="36" y="656" font-size="11" stroke="none" fill="#666">Same EMI, done 20 months early</text>
  <rect x="204" y="612" width="170" height="64" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <rect x="204" y="612" width="4" height="64" rx="2" fill="#888" stroke="none" />
  <text x="224" y="636" font-size="13" font-weight="700" stroke="none" fill="#000">Reduce EMI</text>
  <text x="224" y="656" font-size="11" stroke="none" fill="#666">Same tenure, EMI ↓ by ₹2,180</text>

  <!-- CTA -->
  <rect x="16" y="696" width="358" height="52" rx="12" fill="#000" stroke="none" />
  <text x="195" y="728" font-size="15" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Apply Prepayment Plan</text>

  <!-- bottom nav bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <g transform="translate(183, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Calculator</text>
  </g>
  <text x="335" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <circle cx="365" cy="198" r="12" fill="#000" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="202" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
  <circle cx="365" cy="386" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="390" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
  <circle cx="365" cy="500" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="504" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  <circle cx="365" cy="644" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="648" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
</svg>
