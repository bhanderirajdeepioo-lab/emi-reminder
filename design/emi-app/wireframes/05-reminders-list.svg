<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · reminders list -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />
  <rect x="378" y="20" width="4" height="6" rx="1" fill="#000" stroke="none" />

  <!-- top bar -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <text x="16" y="82" font-size="20" font-weight="700" stroke="none" fill="#000">Loan Reminders</text>
  <!-- filter icon -->
  <g transform="translate(330, 64)">
    <circle cx="16" cy="16" r="14" fill="#e6e6e6" stroke="none" />
    <text x="16" y="21" font-size="14" text-anchor="middle" stroke="none" fill="#000">⚙</text>
  </g>
  <!-- badge count -->
  <circle cx="350" cy="58" r="8" fill="#000" stroke="none" />
  <text x="350" y="62" font-size="10" text-anchor="middle" stroke="none" fill="#fff">3</text>

  <!-- search bar -->
  <rect x="16" y="112" width="358" height="40" rx="20" fill="#e6e6e6" stroke="none" />
  <circle cx="44" cy="132" r="7" fill="none" stroke="#666" stroke-width="1.5" />
  <line x1="49" y1="137" x2="56" y2="144" stroke="#666" stroke-width="1.5" />
  <text x="64" y="137" font-size="14" stroke="none" fill="#666">Search reminders…</text>

  <!-- filter chips row -->
  <rect x="16" y="160" width="56" height="24" rx="12" fill="#000" stroke="none" />
  <text x="44" y="176" font-size="11" text-anchor="middle" stroke="none" fill="#fff">All (3)</text>
  <rect x="80" y="160" width="56" height="24" rx="12" fill="#e6e6e6" stroke="none" />
  <text x="108" y="176" font-size="11" text-anchor="middle" stroke="none" fill="#666">Active</text>
  <rect x="144" y="160" width="72" height="24" rx="12" fill="#e6e6e6" stroke="none" />
  <text x="180" y="176" font-size="11" text-anchor="middle" stroke="none" fill="#666">Due Soon</text>
  <rect x="224" y="160" width="72" height="24" rx="12" fill="#e6e6e6" stroke="none" />
  <text x="260" y="176" font-size="11" text-anchor="middle" stroke="none" fill="#666">Home Loan</text>

  <!-- reminder card 1: SBI Home Loan (URGENT - due in 3 days) -->
  <g transform="translate(16, 200)">
    <rect width="358" height="100" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <!-- colored left accent (thick) -->
    <rect width="6" height="100" rx="3" fill="#000" stroke="none" />
    <!-- icon area -->
    <rect x="18" y="20" width="48" height="48" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="42" y="50" font-size="24" text-anchor="middle" stroke="none" fill="#000">🏠</text>
    <!-- text block -->
    <text x="80" y="36" font-size="14" font-weight="700" stroke="none" fill="#000">SBI Home Loan</text>
    <text x="80" y="54" font-size="12" stroke="none" fill="#666">State Bank of India</text>
    <!-- EMI badge -->
    <rect x="80" y="64" width="80" height="20" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="120" y="78" font-size="11" text-anchor="middle" stroke="none" fill="#000">₹32,450/mo</text>
    <!-- due chip - urgent -->
    <rect x="192" y="64" width="80" height="20" rx="10" fill="#000" stroke="none" />
    <text x="232" y="78" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Due in 3d ⚠</text>
    <!-- EMI amount top right -->
    <text x="338" y="36" font-size="14" font-weight="700" text-anchor="end" stroke="none" fill="#000">₹32,450</text>
    <!-- toggle ON -->
    <rect x="306" y="60" width="40" height="22" rx="11" fill="#000" stroke="none" />
    <circle cx="326" cy="71" r="8" fill="#fff" stroke="none" />
  </g>

  <!-- reminder card 2: HDFC Car Loan -->
  <g transform="translate(16, 316)">
    <rect width="358" height="100" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <!-- left accent lighter -->
    <rect width="6" height="100" rx="3" fill="#888" stroke="none" />
    <!-- icon -->
    <rect x="18" y="20" width="48" height="48" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="42" y="50" font-size="24" text-anchor="middle" stroke="none" fill="#000">🚗</text>
    <!-- text -->
    <text x="80" y="36" font-size="14" font-weight="700" stroke="none" fill="#000">HDFC Car Loan</text>
    <text x="80" y="54" font-size="12" stroke="none" fill="#666">HDFC Bank</text>
    <!-- EMI badge -->
    <rect x="80" y="64" width="80" height="20" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="120" y="78" font-size="11" text-anchor="middle" stroke="none" fill="#000">₹10,941/mo</text>
    <!-- due chip -->
    <rect x="192" y="64" width="80" height="20" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="232" y="78" font-size="11" text-anchor="middle" stroke="none" fill="#000">Due in 12d</text>
    <text x="338" y="36" font-size="14" font-weight="700" text-anchor="end" stroke="none" fill="#000">₹10,941</text>
    <!-- toggle ON -->
    <rect x="306" y="60" width="40" height="22" rx="11" fill="#000" stroke="none" />
    <circle cx="326" cy="71" r="8" fill="#fff" stroke="none" />
  </g>

  <!-- reminder card 3: Axis Personal Loan (inactive) -->
  <g transform="translate(16, 432)">
    <rect width="358" height="100" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <!-- left accent - dashed for inactive -->
    <rect width="6" height="100" rx="3" fill="#e6e6e6" stroke="none" />
    <!-- icon -->
    <rect x="18" y="20" width="48" height="48" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="42" y="50" font-size="24" text-anchor="middle" stroke="none" fill="#666">👤</text>
    <!-- text - greyed for inactive -->
    <text x="80" y="36" font-size="14" font-weight="700" stroke="none" fill="#aaa">Axis Personal</text>
    <text x="80" y="54" font-size="12" stroke="none" fill="#bbb">Axis Bank</text>
    <!-- inactive badge -->
    <rect x="80" y="64" width="64" height="20" rx="10" fill="#e6e6e6" stroke="none" />
    <text x="112" y="78" font-size="11" text-anchor="middle" stroke="none" fill="#aaa">Paused</text>
    <!-- EMI -->
    <text x="338" y="36" font-size="14" font-weight="700" text-anchor="end" stroke="none" fill="#aaa">₹8,240</text>
    <!-- toggle OFF -->
    <rect x="306" y="60" width="40" height="22" rx="11" fill="#e6e6e6" stroke="none" />
    <circle cx="316" cy="71" r="8" fill="#fff" stroke="#e6e6e6" stroke-width="1.5" />
  </g>

  <!-- empty area hint -->
  <text x="195" y="580" font-size="12" text-anchor="middle" stroke="none" fill="#bbb">Swipe left on a card to delete</text>

  <!-- FAB button -->
  <circle cx="334" cy="730" r="28" fill="#000" stroke="none" />
  <line x1="322" y1="730" x2="346" y2="730" stroke="#fff" stroke-width="2.5" />
  <line x1="334" y1="718" x2="334" y2="742" stroke="#fff" stroke-width="2.5" />

  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <text x="195" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Calculator</text>
  <g transform="translate(311, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Reminders</text>
  </g>

  <!-- annotations -->
  <g data-region="annotations">
    <circle cx="370" cy="230" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="234" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="370" cy="346" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="350" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="370" cy="462" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="466" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="334" cy="696" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="334" y="700" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
  </g>
</svg>
