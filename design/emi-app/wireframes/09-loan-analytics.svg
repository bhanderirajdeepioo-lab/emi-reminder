<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#EEF2FF"/>
  <!-- status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>
  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)"/>
  <text x="20" y="84" font-size="20" fill="#FFFFFF">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">Loan Analytics</text>

  <!-- period toggle -->
  <rect x="16" y="116" width="358" height="36" rx="10" fill="#FFFFFF"/>
  <rect x="18" y="118" width="86" height="32" rx="8" fill="#4F46E5"/>
  <text x="61" y="138" font-size="12" font-weight="700" text-anchor="middle" fill="#FFFFFF">6 Months</text>
  <text x="152" y="138" font-size="12" text-anchor="middle" fill="#64748B">1 Year</text>
  <text x="236" y="138" font-size="12" text-anchor="middle" fill="#64748B">3 Years</text>
  <text x="340" y="138" font-size="12" text-anchor="middle" fill="#64748B">All Time</text>

  <!-- Bar chart card -->
  <rect x="16" y="164" width="358" height="200" rx="16" fill="#FFFFFF"/>
  <text x="32" y="192" font-size="13" font-weight="700" fill="#1E293B">Monthly EMI Outflow</text>
  <text x="320" y="192" font-size="11" fill="#64748B">₹ / month</text>
  <!-- bar chart (6 months) -->
  <!-- bars: Jan–Jun stacked: Home(blue), Car(violet), Personal(orange) -->
  <rect x="42" y="310" width="26" height="32" rx="3" fill="#F97316"/>
  <rect x="42" y="270" width="26" height="40" rx="3" fill="#7C3AED"/>
  <rect x="42" y="218" width="26" height="52" rx="3" fill="#4F46E5"/>
  <text x="55" y="330" font-size="9" text-anchor="middle" fill="#94A3B8">Jan</text>

  <rect x="96" y="310" width="26" height="32" rx="3" fill="#F97316"/>
  <rect x="96" y="268" width="26" height="42" rx="3" fill="#7C3AED"/>
  <rect x="96" y="214" width="26" height="54" rx="3" fill="#4F46E5"/>
  <text x="109" y="330" font-size="9" text-anchor="middle" fill="#94A3B8">Feb</text>

  <rect x="150" y="310" width="26" height="32" rx="3" fill="#F97316"/>
  <rect x="150" y="270" width="26" height="40" rx="3" fill="#7C3AED"/>
  <rect x="150" y="216" width="26" height="54" rx="3" fill="#4F46E5"/>
  <text x="163" y="330" font-size="9" text-anchor="middle" fill="#94A3B8">Mar</text>

  <rect x="204" y="310" width="26" height="32" rx="3" fill="#F97316"/>
  <rect x="204" y="268" width="26" height="42" rx="3" fill="#7C3AED"/>
  <rect x="204" y="212" width="26" height="56" rx="3" fill="#4F46E5"/>
  <text x="217" y="330" font-size="9" text-anchor="middle" fill="#94A3B8">Apr</text>

  <rect x="258" y="310" width="26" height="32" rx="3" fill="#F97316"/>
  <rect x="258" y="264" width="26" height="46" rx="3" fill="#7C3AED"/>
  <rect x="258" y="210" width="26" height="54" rx="3" fill="#4F46E5"/>
  <text x="271" y="330" font-size="9" text-anchor="middle" fill="#94A3B8">May</text>

  <rect x="312" y="310" width="26" height="32" rx="3" fill="#F97316"/>
  <rect x="312" y="268" width="26" height="42" rx="3" fill="#7C3AED"/>
  <rect x="312" y="212" width="26" height="56" rx="3" fill="#4F46E5"/>
  <text x="325" y="330" font-size="9" text-anchor="middle" fill="#94A3B8">Jun</text>

  <!-- legend -->
  <rect x="32" y="342" width="9" height="9" rx="2" fill="#4F46E5"/>
  <text x="46" y="351" font-size="10" fill="#64748B">Home</text>
  <rect x="96" y="342" width="9" height="9" rx="2" fill="#7C3AED"/>
  <text x="110" y="351" font-size="10" fill="#64748B">Car</text>
  <rect x="148" y="342" width="9" height="9" rx="2" fill="#F97316"/>
  <text x="162" y="351" font-size="10" fill="#64748B">Personal</text>

  <!-- Summary row -->
  <rect x="16" y="376" width="110" height="72" rx="14" fill="#EEF2FF"/>
  <text x="71" y="400" font-size="11" text-anchor="middle" fill="#64748B">Total Paid</text>
  <text x="71" y="426" font-size="16" font-weight="800" text-anchor="middle" fill="#4F46E5">₹2.6L</text>
  <text x="71" y="442" font-size="10" text-anchor="middle" fill="#94A3B8">6 months</text>

  <rect x="140" y="376" width="110" height="72" rx="14" fill="#F0FDF4"/>
  <text x="195" y="400" font-size="11" text-anchor="middle" fill="#64748B">Avg/Month</text>
  <text x="195" y="426" font-size="16" font-weight="800" text-anchor="middle" fill="#059669">₹43,391</text>
  <text x="195" y="442" font-size="10" text-anchor="middle" fill="#94A3B8">principal+int</text>

  <rect x="264" y="376" width="110" height="72" rx="14" fill="#FFF7ED"/>
  <text x="319" y="400" font-size="11" text-anchor="middle" fill="#64748B">Remaining</text>
  <text x="319" y="426" font-size="16" font-weight="800" text-anchor="middle" fill="#D97706">₹62.8L</text>
  <text x="319" y="442" font-size="10" text-anchor="middle" fill="#94A3B8">total balance</text>

  <!-- Donut: Principal vs Interest -->
  <rect x="16" y="460" width="358" height="180" rx="16" fill="#FFFFFF"/>
  <text x="32" y="488" font-size="13" font-weight="700" fill="#1E293B">Interest vs Principal (YTD)</text>
  <circle cx="120" cy="566" r="56" fill="none" stroke="#E0E7FF" stroke-width="20"/>
  <circle cx="120" cy="566" r="56" fill="none" stroke="#4F46E5" stroke-width="20"
          stroke-dasharray="211 141" stroke-dashoffset="0" transform="rotate(-90 120 566)"/>
  <circle cx="120" cy="566" r="56" fill="none" stroke="#7C3AED" stroke-width="20"
          stroke-dasharray="141 211" stroke-dashoffset="-211" transform="rotate(-90 120 566)"/>
  <text x="120" y="559" font-size="10" text-anchor="middle" fill="#64748B">Principal</text>
  <text x="120" y="576" font-size="14" font-weight="800" text-anchor="middle" fill="#1E293B">60%</text>
  <!-- legend right side -->
  <rect x="210" y="510" width="10" height="10" rx="2" fill="#4F46E5"/>
  <text x="226" y="520" font-size="12" fill="#1E293B">Principal  ₹1.56L</text>
  <rect x="210" y="540" width="10" height="10" rx="2" fill="#7C3AED"/>
  <text x="226" y="550" font-size="12" fill="#1E293B">Interest  ₹1.04L</text>
  <rect x="210" y="570" width="10" height="10" rx="2" fill="#E2E8F0"/>
  <text x="226" y="580" font-size="12" fill="#64748B">Pending  ₹62.8L</text>

  <!-- Savings card -->
  <rect x="16" y="652" width="358" height="68" rx="16" fill="#1E293B"/>
  <text x="32" y="680" font-size="13" font-weight="700" fill="#FFFFFF">💡 Foreclosure saves you</text>
  <text x="32" y="704" font-size="22" font-weight="800" fill="#34D399">₹ 12,40,000</text>
  <text x="252" y="704" font-size="13" fill="#94A3B8">in interest</text>

  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <text x="66" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Dashboard</text>
  <text x="195" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Calculator</text>
  <text x="324" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Reminders</text>
</svg>
