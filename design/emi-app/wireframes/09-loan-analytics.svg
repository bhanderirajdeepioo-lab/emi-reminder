<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · loan portfolio analytics -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />

  <!-- header bar -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <!-- back arrow -->
  <text x="20" y="84" font-size="20" stroke="none" fill="#000">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Portfolio Analytics</text>
  <!-- share icon -->
  <text x="360" y="84" font-size="18" stroke="none" fill="#000">⬆</text>

  <!-- period selector -->
  <rect x="16" y="112" width="358" height="36" rx="8" fill="#e6e6e6" stroke="none" />
  <rect x="18" y="114" width="86" height="32" rx="6" fill="#000" stroke="none" />
  <text x="61" y="134" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">3 Months</text>
  <text x="153" y="134" font-size="12" text-anchor="middle" stroke="none" fill="#666">6 Months</text>
  <text x="246" y="134" font-size="12" text-anchor="middle" stroke="none" fill="#666">1 Year</text>
  <text x="337" y="134" font-size="12" text-anchor="middle" stroke="none" fill="#666">All time</text>

  <!-- section: trend chart -->
  <text x="16" y="172" font-size="12" font-weight="700" stroke="none" fill="#666">MONTHLY EMI TREND</text>
  <rect x="16" y="180" width="358" height="140" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <!-- y-axis labels -->
  <text x="28" y="204" font-size="10" stroke="none" fill="#999">50k</text>
  <text x="28" y="240" font-size="10" stroke="none" fill="#999">45k</text>
  <text x="28" y="276" font-size="10" stroke="none" fill="#999">40k</text>
  <text x="28" y="308" font-size="10" stroke="none" fill="#999">35k</text>
  <!-- grid lines -->
  <line x1="52" y1="200" x2="362" y2="200" stroke="#f0f0f0" stroke-width="1" />
  <line x1="52" y1="236" x2="362" y2="236" stroke="#f0f0f0" stroke-width="1" />
  <line x1="52" y1="272" x2="362" y2="272" stroke="#f0f0f0" stroke-width="1" />
  <line x1="52" y1="304" x2="362" y2="304" stroke="#f0f0f0" stroke-width="1" />
  <!-- line chart (3 months: Apr, May, Jun) -->
  <!-- bars for each month -->
  <rect x="80" y="248" width="48" height="56" rx="4" fill="#000" stroke="none" />
  <rect x="184" y="236" width="48" height="68" rx="4" fill="#000" stroke="none" />
  <rect x="288" y="220" width="48" height="84" rx="4" fill="#000" stroke="none" />
  <!-- x-axis labels -->
  <text x="104" y="320" font-size="11" text-anchor="middle" stroke="none" fill="#666">Apr</text>
  <text x="208" y="320" font-size="11" text-anchor="middle" stroke="none" fill="#666">May</text>
  <text x="312" y="320" font-size="11" text-anchor="middle" stroke="none" fill="#666">Jun</text>
  <!-- value labels on bars -->
  <text x="104" y="244" font-size="10" font-weight="600" text-anchor="middle" stroke="none" fill="#000">₹41.2k</text>
  <text x="208" y="232" font-size="10" font-weight="600" text-anchor="middle" stroke="none" fill="#000">₹43.1k</text>
  <text x="312" y="216" font-size="10" font-weight="600" text-anchor="middle" stroke="none" fill="#000">₹43.4k</text>

  <!-- section: portfolio split donut + legend -->
  <text x="16" y="344" font-size="12" font-weight="700" stroke="none" fill="#666">PORTFOLIO BREAKDOWN</text>
  <rect x="16" y="352" width="358" height="176" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <!-- donut chart (simplified arcs as path) -->
  <!-- outer ring 56px radius at centre 120,440 -->
  <circle cx="128" cy="440" r="56" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="211 88 44 0" stroke-dashoffset="0" />
  <!-- simulating arcs with overlapping circles -->
  <circle cx="128" cy="440" r="56" fill="none" stroke="#000" stroke-width="20" stroke-dasharray="176 176" />
  <circle cx="128" cy="440" r="56" fill="none" stroke="#888" stroke-width="20" stroke-dasharray="88 264" stroke-dashoffset="-176" />
  <circle cx="128" cy="440" r="56" fill="none" stroke="#ccc" stroke-width="20" stroke-dasharray="44 308" stroke-dashoffset="-264" />
  <!-- centre label -->
  <text x="128" y="434" font-size="10" text-anchor="middle" stroke="none" fill="#666">Total</text>
  <text x="128" y="450" font-size="14" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹43.4k</text>
  <!-- legend -->
  <rect x="216" y="376" width="12" height="12" rx="2" fill="#000" stroke="none" />
  <text x="234" y="387" font-size="12" stroke="none" fill="#000">Home Loan</text>
  <text x="234" y="403" font-size="11" stroke="none" fill="#666">₹32,450 · 74.8%</text>
  <rect x="216" y="416" width="12" height="12" rx="2" fill="#888" stroke="none" />
  <text x="234" y="427" font-size="12" stroke="none" fill="#000">Car Loan</text>
  <text x="234" y="443" font-size="11" stroke="none" fill="#666">₹10,941 · 25.2%</text>
  <rect x="216" y="456" width="12" height="12" rx="2" fill="#ccc" stroke="none" />
  <text x="234" y="467" font-size="12" stroke="none" fill="#000">Personal</text>
  <text x="234" y="483" font-size="11" stroke="none" fill="#666">—  paused</text>

  <!-- section: summary metrics -->
  <text x="16" y="552" font-size="12" font-weight="700" stroke="none" fill="#666">3-MONTH SUMMARY</text>
  <rect x="16" y="560" width="358" height="80" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <!-- 3 columns -->
  <line x1="137" y1="572" x2="137" y2="628" stroke="#e5e5e0" stroke-width="1" />
  <line x1="253" y1="572" x2="253" y2="628" stroke="#e5e5e0" stroke-width="1" />
  <text x="76" y="592" font-size="11" text-anchor="middle" stroke="none" fill="#666">Total Paid</text>
  <text x="76" y="618" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹1.3L</text>
  <text x="195" y="592" font-size="11" text-anchor="middle" stroke="none" fill="#666">Interest Paid</text>
  <text x="195" y="618" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹31.2k</text>
  <text x="313" y="592" font-size="11" text-anchor="middle" stroke="none" fill="#666">Principal Paid</text>
  <text x="313" y="618" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹99.1k</text>

  <!-- section: insight card -->
  <text x="16" y="664" font-size="12" font-weight="700" stroke="none" fill="#666">INSIGHT</text>
  <rect x="16" y="672" width="358" height="72" rx="12" fill="#000" stroke="none" />
  <text x="36" y="698" font-size="13" font-weight="600" stroke="none" fill="#fff">💡  Home Loan has 214 EMIs left</text>
  <text x="36" y="720" font-size="12" stroke="none" fill="#aaa">Foreclosure today saves ₹18.4L in interest</text>

  <!-- bottom nav bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <text x="195" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Calculator</text>
  <text x="335" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <circle cx="364" cy="324" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="328" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
  <circle cx="364" cy="440" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="444" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
  <circle cx="364" cy="600" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="604" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  <circle cx="364" cy="708" r="12" fill="#000" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="712" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
</svg>
