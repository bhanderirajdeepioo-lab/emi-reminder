<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · home dashboard -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />
  <rect x="378" y="20" width="4" height="6" rx="1" fill="#000" stroke="none" />

  <!-- header bar -->
  <rect x="0" y="48" width="390" height="88" fill="#fff" stroke="none" />
  <line x1="0" y1="136" x2="390" y2="136" stroke="#e5e5e0" stroke-width="1" />
  <!-- avatar -->
  <circle cx="48" cy="88" r="24" fill="#e6e6e6" stroke="#000" />
  <text x="48" y="93" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#000">RB</text>
  <!-- greeting -->
  <text x="88" y="80" font-size="12" stroke="none" fill="#666">Good morning,</text>
  <text x="88" y="100" font-size="20" font-weight="700" stroke="none" fill="#000">Raj Bhanderi</text>
  <!-- bell icon -->
  <g transform="translate(336, 72)">
    <circle cx="16" cy="8" r="12" fill="none" stroke="#000" stroke-width="1.5" />
    <text x="16" y="13" font-size="14" text-anchor="middle" stroke="none" fill="#000">🔔</text>
  </g>

  <!-- section: summary cards -->
  <text x="16" y="160" font-size="12" font-weight="700" stroke="none" fill="#666">LOAN SUMMARY</text>

  <!-- card 1: Total Active Loans -->
  <g transform="translate(16, 168)">
    <rect width="172" height="88" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <text x="16" y="28" font-size="11" stroke="none" fill="#666">Total Active Loans</text>
    <text x="16" y="60" font-size="28" font-weight="700" stroke="none" fill="#000">3</text>
    <text x="16" y="80" font-size="11" stroke="none" fill="#666">Home · Car · Personal</text>
  </g>

  <!-- card 2: Next Due Date -->
  <g transform="translate(202, 168)">
    <rect width="172" height="88" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <text x="16" y="28" font-size="11" stroke="none" fill="#666">Next Due Date</text>
    <text x="16" y="60" font-size="28" font-weight="700" stroke="none" fill="#000">3</text>
    <text x="16" y="80" font-size="11" stroke="none" fill="#000">days remaining</text>
  </g>

  <!-- card 3: Monthly EMI total (full width) -->
  <g transform="translate(16, 264)">
    <rect width="358" height="72" rx="12" fill="#000" stroke="none" />
    <text x="16" y="28" font-size="11" stroke="none" fill="#aaa">Total EMI / Month</text>
    <text x="16" y="56" font-size="24" font-weight="700" stroke="none" fill="#fff">₹ 43,391</text>
    <!-- mini bar graph on right -->
    <rect x="272" y="16" width="8" height="40" rx="2" fill="#555" stroke="none" />
    <rect x="288" y="24" width="8" height="32" rx="2" fill="#555" stroke="none" />
    <rect x="304" y="8" width="8" height="48" rx="2" fill="#888" stroke="none" />
    <rect x="320" y="20" width="8" height="36" rx="2" fill="#555" stroke="none" />
    <rect x="336" y="12" width="8" height="44" rx="2" fill="#aaa" stroke="none" />
  </g>

  <!-- quick actions section -->
  <text x="16" y="368" font-size="12" font-weight="700" stroke="none" fill="#666">QUICK ACTIONS</text>

  <!-- action card 1: Calculator -->
  <g transform="translate(16, 376)">
    <rect width="104" height="88" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <rect x="32" y="12" width="40" height="40" rx="8" fill="#e6e6e6" stroke="none" />
    <text x="52" y="37" font-size="18" text-anchor="middle" stroke="none" fill="#000">=</text>
    <text x="52" y="76" font-size="11" text-anchor="middle" stroke="none" fill="#000">Calculator</text>
  </g>

  <!-- action card 2: Add Reminder -->
  <g transform="translate(143, 376)">
    <rect width="104" height="88" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <rect x="32" y="12" width="40" height="40" rx="8" fill="#e6e6e6" stroke="none" />
    <text x="52" y="38" font-size="22" text-anchor="middle" stroke="none" fill="#000">+</text>
    <text x="52" y="76" font-size="11" text-anchor="middle" stroke="none" fill="#000">Add Reminder</text>
  </g>

  <!-- action card 3: View All -->
  <g transform="translate(270, 376)">
    <rect width="104" height="88" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <rect x="32" y="12" width="40" height="40" rx="8" fill="#e6e6e6" stroke="none" />
    <text x="52" y="37" font-size="16" text-anchor="middle" stroke="none" fill="#000">≡</text>
    <text x="52" y="76" font-size="11" text-anchor="middle" stroke="none" fill="#000">View All</text>
  </g>

  <!-- recent reminders section -->
  <text x="16" y="496" font-size="12" font-weight="700" stroke="none" fill="#666">RECENT REMINDERS</text>
  <text x="318" y="496" font-size="12" stroke="none" fill="#000">See all →</text>

  <!-- reminder card 1 -->
  <g transform="translate(16, 504)">
    <rect width="358" height="80" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <!-- left accent bar -->
    <rect width="4" height="80" rx="2" fill="#000" stroke="none" />
    <!-- icon -->
    <rect x="16" y="20" width="40" height="40" rx="8" fill="#e6e6e6" stroke="none" />
    <text x="36" y="45" font-size="16" text-anchor="middle" stroke="none" fill="#000">🏠</text>
    <!-- text -->
    <text x="72" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">SBI Home Loan</text>
    <text x="72" y="52" font-size="12" stroke="none" fill="#666">State Bank of India</text>
    <!-- amount -->
    <text x="290" y="30" font-size="14" font-weight="700" stroke="none" fill="#000">₹32,450</text>
    <!-- due chip -->
    <rect x="274" y="48" width="72" height="22" rx="11" fill="#000" stroke="none" />
    <text x="310" y="63" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Due in 3d</text>
  </g>

  <!-- reminder card 2 -->
  <g transform="translate(16, 600)">
    <rect width="358" height="80" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
    <!-- left accent bar (dashed = different style) -->
    <rect width="4" height="80" rx="2" fill="#666" stroke="none" />
    <!-- icon -->
    <rect x="16" y="20" width="40" height="40" rx="8" fill="#e6e6e6" stroke="none" />
    <text x="36" y="45" font-size="16" text-anchor="middle" stroke="none" fill="#000">🚗</text>
    <!-- text -->
    <text x="72" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">HDFC Car Loan</text>
    <text x="72" y="52" font-size="12" stroke="none" fill="#666">HDFC Bank</text>
    <!-- amount -->
    <text x="282" y="30" font-size="14" font-weight="700" stroke="none" fill="#000">₹10,941</text>
    <!-- due chip -->
    <rect x="266" y="48" width="80" height="22" rx="11" fill="#e6e6e6" stroke="none" />
    <text x="306" y="63" font-size="11" text-anchor="middle" stroke="none" fill="#000">Due in 12d</text>
  </g>

  <!-- bottom navigation bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <!-- active: home icon -->
  <g transform="translate(55, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Dashboard</text>
  </g>
  <!-- inactive: calculator icon -->
  <text x="195" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Calculator</text>
  <!-- inactive: reminders -->
  <text x="335" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <g data-region="annotations">
    <circle cx="50" cy="156" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="50" y="160" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="355" cy="256" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="260" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="355" cy="464" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="468" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="355" cy="550" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="554" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
  </g>
</svg>
