<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#EEF2FF"/>
  <!-- status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>
  <!-- header gradient -->
  <rect x="0" y="48" width="390" height="100" fill="url(#hdr)"/>
  <!-- app logo circle -->
  <circle cx="48" cy="98" r="22" fill="#312E81"/>
  <text x="48" y="106" font-size="20" text-anchor="middle" fill="#E0E7FF">₹</text>
  <!-- app name + date (no user name) -->
  <text x="82" y="84" font-size="14" font-weight="800" fill="#FFFFFF">EMI Reminder &amp; Calculator</text>
  <text x="82" y="106" font-size="12" fill="#C7D2FE">Mon, 30 Jun 2026</text>
  <!-- bell -->
  <circle cx="358" cy="98" r="18" fill="#3730A3"/>
  <text x="358" y="104" font-size="16" text-anchor="middle" fill="#E0E7FF">🔔</text>
  <!-- small badge on bell -->
  <circle cx="368" cy="85" r="7" fill="#DC2626"/>
  <text x="368" y="89" font-size="9" font-weight="700" text-anchor="middle" fill="#fff">2</text>

  <!-- LOAN SUMMARY section -->
  <text x="16" y="170" font-size="11" font-weight="700" fill="#64748B">LOAN SUMMARY</text>

  <!-- card: Total Active Loans -->
  <rect x="16" y="178" width="172" height="90" rx="14" fill="url(#card1)"/>
  <text x="32" y="204" font-size="11" fill="#C7D2FE">Total Active Loans</text>
  <text x="32" y="240" font-size="30" font-weight="800" fill="#FFFFFF">3</text>
  <text x="32" y="260" font-size="11" fill="#A5B4FC">Home · Car · Personal</text>

  <!-- card: Next Due -->
  <rect x="202" y="178" width="172" height="90" rx="14" fill="url(#card2)"/>
  <text x="218" y="204" font-size="11" fill="#BAE6FD">Next Due Date</text>
  <text x="218" y="240" font-size="30" font-weight="800" fill="#FFFFFF">3</text>
  <text x="218" y="260" font-size="11" fill="#E0F2FE">days remaining</text>

  <!-- card: Monthly EMI total -->
  <rect x="16" y="276" width="358" height="76" rx="14" fill="#1E293B"/>
  <text x="32" y="300" font-size="11" fill="#94A3B8">Total EMI / Month</text>
  <text x="32" y="334" font-size="26" font-weight="800" fill="#FFFFFF">₹ 43,391</text>
  <!-- mini bars -->
  <rect x="276" y="286" width="9" height="40" rx="3" fill="#4F46E5"/>
  <rect x="292" y="294" width="9" height="32" rx="3" fill="#6366F1"/>
  <rect x="308" y="280" width="9" height="48" rx="3" fill="#818CF8"/>
  <rect x="324" y="290" width="9" height="38" rx="3" fill="#6366F1"/>
  <rect x="340" y="284" width="9" height="44" rx="3" fill="#A5B4FC"/>
  <!-- trend label -->
  <text x="356" y="344" font-size="10" text-anchor="end" fill="#4F46E5">↑ 2.1%</text>

  <!-- QUICK ACTIONS -->
  <text x="16" y="376" font-size="11" font-weight="700" fill="#64748B">QUICK ACTIONS</text>
  <!-- tile 1 -->
  <rect x="16" y="384" width="108" height="92" rx="14" fill="#FFFFFF"/>
  <rect x="50" y="396" width="40" height="40" rx="10" fill="#EEF2FF"/>
  <text x="70" y="422" font-size="22" text-anchor="middle" fill="#4F46E5">⚡</text>
  <text x="70" y="466" font-size="11" text-anchor="middle" fill="#1E293B">Calculator</text>
  <!-- tile 2 -->
  <rect x="141" y="384" width="108" height="92" rx="14" fill="#FFFFFF"/>
  <rect x="175" y="396" width="40" height="40" rx="10" fill="#F0FDF4"/>
  <text x="195" y="422" font-size="22" text-anchor="middle" fill="#059669">+</text>
  <text x="195" y="466" font-size="11" text-anchor="middle" fill="#1E293B">Add Loan</text>
  <!-- tile 3 -->
  <rect x="266" y="384" width="108" height="92" rx="14" fill="#FFFFFF"/>
  <rect x="300" y="396" width="40" height="40" rx="10" fill="#FFF7ED"/>
  <text x="320" y="422" font-size="20" text-anchor="middle" fill="#D97706">📊</text>
  <text x="320" y="466" font-size="11" text-anchor="middle" fill="#1E293B">Analytics</text>

  <!-- RECENT REMINDERS -->
  <text x="16" y="502" font-size="11" font-weight="700" fill="#64748B">UPCOMING EMIs</text>
  <text x="320" y="502" font-size="12" fill="#4F46E5">See all →</text>

  <!-- Reminder card 1 — urgent (red) -->
  <rect x="16" y="510" width="358" height="80" rx="14" fill="#FFFFFF"/>
  <rect x="16" y="510" width="5" height="80" rx="2.5" fill="#DC2626"/>
  <!-- icon -->
  <rect x="28" y="526" width="40" height="40" rx="10" fill="#FEF2F2"/>
  <text x="48" y="551" font-size="20" text-anchor="middle">🏠</text>
  <!-- text -->
  <text x="80" y="540" font-size="14" font-weight="600" fill="#1E293B">SBI Home Loan</text>
  <text x="80" y="558" font-size="12" fill="#64748B">State Bank of India</text>
  <!-- right side -->
  <text x="356" y="538" font-size="14" font-weight="700" text-anchor="end" fill="#1E293B">₹32,450</text>
  <rect x="296" y="548" width="60" height="22" rx="11" fill="#DC2626"/>
  <text x="326" y="563" font-size="11" font-weight="600" text-anchor="middle" fill="#fff">Due in 3d ⚠</text>

  <!-- Reminder card 2 — normal (blue) -->
  <rect x="16" y="604" width="358" height="80" rx="14" fill="#FFFFFF"/>
  <rect x="16" y="604" width="5" height="80" rx="2.5" fill="#4F46E5"/>
  <rect x="28" y="620" width="40" height="40" rx="10" fill="#EEF2FF"/>
  <text x="48" y="645" font-size="20" text-anchor="middle">🚗</text>
  <text x="80" y="634" font-size="14" font-weight="600" fill="#1E293B">HDFC Car Loan</text>
  <text x="80" y="652" font-size="12" fill="#64748B">HDFC Bank</text>
  <text x="356" y="632" font-size="14" font-weight="700" text-anchor="end" fill="#1E293B">₹10,941</text>
  <rect x="286" y="642" width="70" height="22" rx="11" fill="#EEF2FF"/>
  <text x="321" y="657" font-size="11" font-weight="600" text-anchor="middle" fill="#4F46E5">Due in 12d</text>

  <!-- bottom nav — 4 tabs with icons -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <!-- active: Home -->
  <rect x="5" y="798" width="88" height="44" rx="12" fill="#EEF2FF"/>
  <text x="49" y="815" font-size="16" text-anchor="middle" fill="#4F46E5">🏠</text>
  <text x="49" y="834" font-size="9" font-weight="700" text-anchor="middle" fill="#4F46E5">Home</text>
  <!-- Calculator -->
  <text x="147" y="815" font-size="16" text-anchor="middle" fill="#94A3B8">⚡</text>
  <text x="147" y="834" font-size="9" text-anchor="middle" fill="#94A3B8">Calculator</text>
  <!-- Reminders -->
  <text x="244" y="815" font-size="16" text-anchor="middle" fill="#94A3B8">🔔</text>
  <text x="244" y="834" font-size="9" text-anchor="middle" fill="#94A3B8">Reminders</text>
  <!-- Finance -->
  <text x="341" y="815" font-size="16" text-anchor="middle" fill="#94A3B8">💰</text>
  <text x="341" y="834" font-size="9" text-anchor="middle" fill="#94A3B8">Finance</text>

  <!-- annotations -->
  <circle cx="356" cy="230" r="12" fill="#EEF2FF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="356" y="234" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">1</text>
  <circle cx="356" cy="316" r="12" fill="#1E293B" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="356" y="320" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">2</text>
  <circle cx="356" cy="430" r="12" fill="#FFFFFF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="356" y="434" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">3</text>
  <circle cx="356" cy="550" r="12" fill="#FFFFFF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="356" y="554" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">4</text>
</svg>
