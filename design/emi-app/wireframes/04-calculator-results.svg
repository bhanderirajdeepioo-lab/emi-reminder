<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · calculator results -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />
  <rect x="378" y="20" width="4" height="6" rx="1" fill="#000" stroke="none" />

  <!-- top bar -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <!-- back arrow -->
  <text x="24" y="82" font-size="20" stroke="none" fill="#000">←</text>
  <text x="195" y="82" font-size="20" font-weight="700" text-anchor="middle" stroke="none" fill="#000">EMI Results</text>
  <!-- share -->
  <text x="358" y="82" font-size="20" stroke="none" fill="#000">⬆</text>

  <!-- EMI hero card -->
  <rect x="16" y="112" width="358" height="104" rx="16" fill="#000" stroke="none" />
  <text x="195" y="144" font-size="12" text-anchor="middle" stroke="none" fill="#aaa">Monthly EMI</text>
  <text x="195" y="184" font-size="36" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">₹ 43,391</text>
  <text x="195" y="208" font-size="12" text-anchor="middle" stroke="none" fill="#888">Home Loan · ₹50L · 8.5% · 20yrs</text>

  <!-- donut chart area -->
  <!-- outer ring (Total) -->
  <circle cx="195" cy="312" r="72" fill="none" stroke="#e6e6e6" stroke-width="20" />
  <!-- arc 1: Principal portion (~52%) - using stroke-dasharray trick -->
  <circle cx="195" cy="312" r="72" fill="none" stroke="#000" stroke-width="20"
          stroke-dasharray="234 218" stroke-dashoffset="0"
          transform="rotate(-90, 195, 312)" />
  <!-- arc 2: Interest portion (~48%) already shown by gap -->
  <circle cx="195" cy="312" r="72" fill="none" stroke="#888" stroke-width="20"
          stroke-dasharray="208 244" stroke-dashoffset="-234"
          transform="rotate(-90, 195, 312)" />
  <!-- center label -->
  <text x="195" y="305" font-size="11" text-anchor="middle" stroke="none" fill="#666">Total</text>
  <text x="195" y="322" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹1.04Cr</text>

  <!-- legend -->
  <rect x="108" y="388" width="12" height="12" rx="2" fill="#000" stroke="none" />
  <text x="128" y="400" font-size="12" stroke="none" fill="#000">Principal  ₹50L (52%)</text>
  <rect x="108" y="408" width="12" height="12" rx="2" fill="#888" stroke="none" />
  <text x="128" y="420" font-size="12" stroke="none" fill="#666">Interest  ₹54L (48%)</text>

  <!-- summary stats row -->
  <rect x="16" y="440" width="358" height="72" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <!-- 3 KV pairs -->
  <line x1="146" y1="456" x2="146" y2="496" stroke="#e5e5e0" stroke-width="1" />
  <line x1="244" y1="456" x2="244" y2="496" stroke="#e5e5e0" stroke-width="1" />
  <text x="73" y="468" font-size="11" text-anchor="middle" stroke="none" fill="#666">Total Payment</text>
  <text x="73" y="490" font-size="14" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹1.04Cr</text>
  <text x="195" y="468" font-size="11" text-anchor="middle" stroke="none" fill="#666">Total Interest</text>
  <text x="195" y="490" font-size="14" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹54.1L</text>
  <text x="317" y="468" font-size="11" text-anchor="middle" stroke="none" fill="#666">Principal</text>
  <text x="317" y="490" font-size="14" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹50L</text>

  <!-- view schedule button -->
  <rect x="16" y="528" width="358" height="48" rx="12" fill="#fff" stroke="#000" stroke-width="1.5" />
  <text x="195" y="557" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#000">View Full Amortization Schedule ↓</text>

  <!-- amortization table preview -->
  <text x="16" y="604" font-size="12" font-weight="700" stroke="none" fill="#666">SCHEDULE PREVIEW</text>

  <!-- table header -->
  <rect x="16" y="612" width="358" height="32" rx="0" fill="#e6e6e6" stroke="none" />
  <text x="32" y="632" font-size="11" font-weight="600" stroke="none" fill="#000">Month</text>
  <text x="116" y="632" font-size="11" font-weight="600" stroke="none" fill="#000">EMI</text>
  <text x="196" y="632" font-size="11" font-weight="600" stroke="none" fill="#000">Principal</text>
  <text x="288" y="632" font-size="11" font-weight="600" stroke="none" fill="#000">Interest</text>
  <line x1="16" y1="644" x2="374" y2="644" stroke="#e5e5e0" stroke-width="1" />

  <!-- rows -->
  <g transform="translate(16, 644)">
    <!-- row 1 -->
    <rect width="358" height="28" fill="#fff" stroke="none" />
    <text x="16" y="19" font-size="11" stroke="none" fill="#000">Jan 2025</text>
    <text x="100" y="19" font-size="11" stroke="none" fill="#000">₹43,391</text>
    <text x="180" y="19" font-size="11" stroke="none" fill="#000">₹7,892</text>
    <text x="272" y="19" font-size="11" stroke="none" fill="#000">₹35,417</text>
    <line x1="0" y1="28" x2="358" y2="28" stroke="#f4f4f4" stroke-width="1" />
  </g>
  <g transform="translate(16, 672)">
    <!-- row 2 -->
    <rect width="358" height="28" fill="#fff" stroke="none" />
    <text x="16" y="19" font-size="11" stroke="none" fill="#000">Feb 2025</text>
    <text x="100" y="19" font-size="11" stroke="none" fill="#000">₹43,391</text>
    <text x="180" y="19" font-size="11" stroke="none" fill="#000">₹7,949</text>
    <text x="272" y="19" font-size="11" stroke="none" fill="#000">₹35,359</text>
    <line x1="0" y1="28" x2="358" y2="28" stroke="#f4f4f4" stroke-width="1" />
  </g>
  <g transform="translate(16, 700)">
    <!-- row 3 -->
    <rect width="358" height="28" fill="#fff" stroke="none" />
    <text x="16" y="19" font-size="11" stroke="none" fill="#000">Mar 2025</text>
    <text x="100" y="19" font-size="11" stroke="none" fill="#000">₹43,391</text>
    <text x="180" y="19" font-size="11" stroke="none" fill="#000">₹8,006</text>
    <text x="272" y="19" font-size="11" stroke="none" fill="#000">₹35,302</text>
    <line x1="0" y1="28" x2="358" y2="28" stroke="#f4f4f4" stroke-width="1" />
  </g>
  <g transform="translate(16, 728)">
    <!-- row 4 gradient fade hint -->
    <rect width="358" height="28" fill="#fff" fill-opacity="0.7" stroke="none" />
    <text x="16" y="19" font-size="11" stroke="none" fill="#999">Apr 2025</text>
    <text x="100" y="19" font-size="11" stroke="none" fill="#999">₹43,391</text>
    <text x="180" y="19" font-size="11" stroke="none" fill="#999">₹8,064</text>
    <text x="272" y="19" font-size="11" stroke="none" fill="#999">₹35,244</text>
  </g>
  <!-- fade overlay hint -->
  <rect x="16" y="750" width="358" height="40" fill="#f4f4f4" fill-opacity="0.9" stroke="none" />
  <text x="195" y="776" font-size="12" text-anchor="middle" stroke="none" fill="#666">↓ 236 more rows</text>

  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <g transform="translate(171, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Calculator</text>
  </g>
  <text x="335" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <g data-region="annotations">
    <circle cx="20" cy="160" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="20" y="164" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="20" cy="312" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="20" y="316" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="20" cy="476" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="20" y="480" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="20" cy="552" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="20" y="556" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
  </g>
</svg>
