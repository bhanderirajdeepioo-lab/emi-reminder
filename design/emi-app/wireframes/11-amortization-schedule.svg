  <text x="108" y="360" font-size="11" font-weight="700" fill="#FFFFFF">EMI</text>
  <text x="176" y="360" font-size="11" font-weight="700" fill="#FFFFFF">Principal</text>
  <text x="252" y="360" font-size="11" font-weight="700" fill="#FFFFFF">Interest</text>
  <text x="318" y="360" font-size="11" font-weight="700" fill="#FFFFFF">Balance</text>

