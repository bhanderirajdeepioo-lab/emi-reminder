<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#EEF2FF"/>
  <!-- status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>
  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)"/>
  <text x="20" y="84" font-size="20" fill="#FFFFFF">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">Amortization Schedule</text>

  <!-- summary strip -->
  <rect x="16" y="116" width="358" height="60" rx="14" fill="#1E293B"/>
  <text x="32" y="138" font-size="11" fill="#94A3B8">SBI Home Loan · ₹50L · 8.5% · 20yr</text>
  <text x="32" y="164" font-size="11" fill="#64748B">Total Interest: </text>
  <text x="122" y="164" font-size="11" font-weight="700" fill="#A5B4FC">₹28,08,093</text>
  <text x="220" y="164" font-size="11" fill="#64748B">Total: </text>
  <text x="256" y="164" font-size="11" font-weight="700" fill="#C7D2FE">₹78,08,093</text>

  <!-- area chart (interest decay) -->
  <rect x="16" y="188" width="358" height="140" rx="14" fill="#FFFFFF"/>
  <text x="32" y="212" font-size="12" font-weight="700" fill="#1E293B">Interest vs Principal over time</text>
  <!-- chart axis -->
  <line x1="32" y1="300" x2="362" y2="300" stroke="#E2E8F0" stroke-width="1"/>
  <!-- interest area -->
  <path d="M32,240 C80,238 140,248 200,262 C260,276 320,294 362,300 L362,300 L32,300 Z"
        fill="#7C3AED" opacity="0.25"/>
  <path d="M32,240 C80,238 140,248 200,262 C260,276 320,294 362,300"
        fill="none" stroke="#7C3AED" stroke-width="2"/>
  <!-- principal area -->
  <path d="M32,296 C80,286 140,272 200,258 C260,244 320,236 362,234 L362,300 L32,300 Z"
        fill="#4F46E5" opacity="0.2"/>
  <path d="M32,296 C80,286 140,272 200,258 C260,244 320,236 362,234"
        fill="none" stroke="#4F46E5" stroke-width="2"/>
  <!-- x-axis labels -->
  <text x="32" y="318" font-size="9" fill="#94A3B8">Yr 1</text>
  <text x="120" y="318" font-size="9" fill="#94A3B8">Yr 5</text>
  <text x="200" y="318" font-size="9" fill="#94A3B8">Yr 10</text>
  <text x="280" y="318" font-size="9" fill="#94A3B8">Yr 15</text>
  <text x="350" y="318" font-size="9" fill="#94A3B8">Yr 20</text>

  <!-- table header -->
  <rect x="16" y="340" width="358" height="32" rx="8" fill="#4F46E5"/>
