  <text x="108" y="424" font-size="11" fill="#1E293B">₹32,450</text>
  <text x="176" y="424" font-size="11" fill="#059669">₹3,558</text>
  <text x="252" y="424" font-size="11" fill="#DC2626">₹28,892</text>
  <text x="318" y="424" font-size="11" fill="#1E293B">₹49.5L</text>

  <rect x="16" y="436" width="358" height="32" fill="#F8FAFC"/>
  <text x="32" y="456" font-size="11" fill="#64748B">Sep 2026</text>
  <text x="108" y="456" font-size="11" fill="#1E293B">₹32,450</text>
  <text x="176" y="456" font-size="11" fill="#059669">₹3,583</text>
  <text x="252" y="456" font-size="11" fill="#DC2626">₹28,867</text>
  <text x="318" y="456" font-size="11" fill="#1E293B">₹49.5L</text>

  <rect x="16" y="468" width="358" height="32" fill="#FFFFFF"/>
  <text x="32" y="488" font-size="11" fill="#64748B">Oct 2026</text>
  <text x="108" y="488" font-size="11" fill="#1E293B">₹32,450</text>
  <text x="176" y="488" font-size="11" fill="#059669">₹3,608</text>
  <text x="252" y="488" font-size="11" fill="#DC2626">₹28,842</text>
  <text x="318" y="488" font-size="11" fill="#1E293B">₹49.4L</text>

  <rect x="16" y="500" width="358" height="32" fill="#F8FAFC"/>
  <text x="32" y="520" font-size="11" fill="#64748B">Nov 2026</text>
  <text x="108" y="520" font-size="11" fill="#1E293B">₹32,450</text>
  <text x="176" y="520" font-size="11" fill="#059669">₹3,634</text>
  <text x="252" y="520" font-size="11" fill="#DC2626">₹28,816</text>
  <text x="318" y="520" font-size="11" fill="#1E293B">₹49.4L</text>

  <rect x="16" y="532" width="358" height="32" fill="#FFFFFF"/>
  <text x="32" y="552" font-size="11" fill="#64748B">Dec 2026</text>
  <text x="108" y="552" font-size="11" fill="#1E293B">₹32,450</text>
  <text x="176" y="552" font-size="11" fill="#059669">₹3,660</text>
  <text x="252" y="552" font-size="11" fill="#DC2626">₹28,790</text>
  <text x="318" y="552" font-size="11" fill="#1E293B">₹49.3L</text>

  <!-- more rows indicator -->
  <text x="195" y="590" font-size="12" text-anchor="middle" fill="#94A3B8">↓ 234 more rows…</text>

  <!-- year jump -->
  <rect x="16" y="600" width="358" height="40" rx="12" fill="#FFFFFF"/>
  <text x="32" y="625" font-size="12" fill="#64748B">Jump to year:</text>
  <rect x="128" y="608" width="44" height="24" rx="8" fill="#EEF2FF"/>
  <text x="150" y="624" font-size="12" font-weight="600" text-anchor="middle" fill="#4F46E5">5</text>
  <rect x="180" y="608" width="44" height="24" rx="8" fill="#EEF2FF"/>
  <text x="202" y="624" font-size="12" font-weight="600" text-anchor="middle" fill="#4F46E5">10</text>
  <rect x="232" y="608" width="44" height="24" rx="8" fill="#EEF2FF"/>
  <text x="254" y="624" font-size="12" font-weight="600" text-anchor="middle" fill="#4F46E5">15</text>
  <rect x="284" y="608" width="44" height="24" rx="8" fill="#EEF2FF"/>
  <text x="306" y="624" font-size="12" font-weight="600" text-anchor="middle" fill="#4F46E5">20</text>

  <!-- export button -->
  <rect x="16" y="652" width="358" height="48" rx="14" fill="#4F46E5"/>
  <text x="195" y="682" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">Export to PDF / CSV</text>

  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <text x="66" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Dashboard</text>
  <text x="195" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Calculator</text>
  <text x="324" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Reminders</text>
