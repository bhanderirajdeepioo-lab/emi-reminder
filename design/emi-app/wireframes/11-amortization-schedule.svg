  <text x="108" y="392" font-size="11" fill="#1E293B">₹32,450</text>
  <text x="176" y="392" font-size="11" fill="#059669">₹3,533</text>
  <text x="252" y="392" font-size="11" fill="#DC2626">₹28,917</text>
  <text x="318" y="392" font-size="11" fill="#1E293B">₹49.6L</text>

