<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- background screen (reminders list, dimmed) -->
  <rect width="390" height="844" fill="#EEF2FF"/>
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)" opacity="0.6"/>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF" opacity="0.6">Reminders</text>
  <!-- scrim -->
  <rect width="390" height="844" fill="#0F172A" opacity="0.6"/>

  <!-- bottom sheet -->
  <rect x="0" y="244" width="390" height="600" rx="24" fill="#FFFFFF"/>
  <!-- drag handle -->
  <rect x="171" y="256" width="48" height="4" rx="2" fill="#CBD5E1"/>
  <!-- title row -->
  <text x="24" y="300" font-size="18" font-weight="700" fill="#1E293B">Add Loan Reminder</text>
  <circle cx="358" cy="292" r="16" fill="#EEF2FF"/>
  <text x="358" y="297" font-size="14" text-anchor="middle" fill="#64748B">✕</text>

  <!-- Loan Name -->
  <text x="24" y="334" font-size="11" font-weight="600" fill="#64748B">LOAN NAME</text>
  <rect x="24" y="342" width="342" height="48" rx="12" fill="#F8FAFC" stroke-width="1.5"/>
  <rect x="24" y="342" width="342" height="48" rx="12" fill="none" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="40" y="371" font-size="14" fill="#1E293B">SBI Home Loan</text>
  <!-- cursor blink -->
  <rect x="186" y="358" width="2" height="18" fill="#4F46E5"/>

  <!-- Bank Name + EMI Amount row -->
  <text x="24" y="412" font-size="11" font-weight="600" fill="#64748B">BANK / LENDER</text>
  <rect x="24" y="420" width="162" height="48" rx="12" fill="#F8FAFC"/>
  <text x="40" y="449" font-size="14" fill="#1E293B">State Bank of India</text>

  <text x="206" y="412" font-size="11" font-weight="600" fill="#64748B">EMI AMOUNT</text>
  <rect x="206" y="420" width="160" height="48" rx="12" fill="#F8FAFC"/>
  <text x="222" y="441" font-size="11" fill="#64748B">₹</text>
  <text x="240" y="449" font-size="14" fill="#1E293B">32,450</text>

  <!-- Due Date + Repeat -->
  <text x="24" y="490" font-size="11" font-weight="600" fill="#64748B">DUE DATE</text>
  <rect x="24" y="498" width="162" height="48" rx="12" fill="#F8FAFC"/>
  <text x="40" y="527" font-size="14" fill="#1E293B">5th of every month</text>

  <text x="206" y="490" font-size="11" font-weight="600" fill="#64748B">REPEAT</text>
  <rect x="206" y="498" width="160" height="48" rx="12" fill="#F8FAFC"/>
  <text x="222" y="527" font-size="14" fill="#1E293B">Monthly ›</text>

  <!-- Note -->
  <text x="24" y="568" font-size="11" font-weight="600" fill="#64748B">NOTE (OPTIONAL)</text>
  <rect x="24" y="576" width="342" height="60" rx="12" fill="#F8FAFC"/>
  <text x="40" y="606" font-size="13" fill="#94A3B8">Add a note…</text>

  <!-- Notification toggle -->
  <rect x="24" y="648" width="342" height="48" rx="12" fill="#F0F4FF"/>
  <text x="40" y="677" font-size="14" fill="#1E293B">Send notification reminder</text>
  <rect x="320" y="660" width="44" height="24" rx="12" fill="#4F46E5"/>
  <circle cx="354" cy="672" r="10" fill="#FFFFFF"/>

  <!-- Save CTA -->
  <rect x="24" y="712" width="342" height="52" rx="16" fill="#4F46E5"/>
  <text x="195" y="743" font-size="15" font-weight="700" text-anchor="middle" fill="#FFFFFF">Save Reminder</text>
</svg>
