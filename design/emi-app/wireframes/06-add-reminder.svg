<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · add/edit reminder bottom sheet -->

  <!-- background (dimmed screen behind sheet) -->
  <rect width="390" height="844" fill="#000" fill-opacity="0.5" stroke="none" />

  <!-- ghost of underlying screen (blurred list) -->
  <rect x="0" y="0" width="390" height="280" fill="#f4f4f4" fill-opacity="0.3" stroke="none" />
  <rect x="16" y="60" width="358" height="56" rx="8" fill="#fff" fill-opacity="0.2" stroke="none" />
  <rect x="16" y="130" width="358" height="72" rx="8" fill="#fff" fill-opacity="0.15" stroke="none" />

  <!-- status bar -->
  <text x="16" y="32" font-size="12" stroke="none" fill="#fff">9:41</text>

  <!-- bottom sheet panel -->
  <rect x="0" y="232" width="390" height="612" rx="0" fill="#fff" stroke="none" />
  <!-- rounded top corners only -->
  <rect x="0" y="232" width="390" height="24" rx="12" fill="#fff" stroke="none" />
  <!-- handle bar -->
  <rect x="163" y="244" width="64" height="4" rx="2" fill="#e6e6e6" stroke="none" />

  <!-- sheet header -->
  <text x="24" y="292" font-size="20" font-weight="700" stroke="none" fill="#000">Add Reminder</text>
  <g transform="translate(334, 270)">
    <circle cx="16" cy="16" r="14" fill="#e6e6e6" stroke="none" />
    <text x="16" y="21" font-size="16" text-anchor="middle" stroke="none" fill="#000">✕</text>
  </g>

  <!-- field: Loan Name -->
  <text x="24" y="328" font-size="12" font-weight="600" stroke="none" fill="#666">LOAN NAME</text>
  <rect x="24" y="336" width="342" height="44" rx="10" fill="#f4f4f4" stroke="#e5e5e0" stroke-width="1" />
  <text x="40" y="363" font-size="14" stroke="none" fill="#666">e.g. SBI Home Loan</text>

  <!-- loan type chips -->
  <text x="24" y="404" font-size="12" font-weight="600" stroke="none" fill="#666">LOAN TYPE</text>
  <!-- chip: Home (selected) -->
  <rect x="24" y="412" width="76" height="28" rx="14" fill="#000" stroke="none" />
  <text x="62" y="430" font-size="12" text-anchor="middle" stroke="none" fill="#fff">🏠 Home</text>
  <!-- chip: Car -->
  <rect x="108" y="412" width="64" height="28" rx="14" fill="#e6e6e6" stroke="none" />
  <text x="140" y="430" font-size="12" text-anchor="middle" stroke="none" fill="#666">🚗 Car</text>
  <!-- chip: Personal -->
  <rect x="180" y="412" width="80" height="28" rx="14" fill="#e6e6e6" stroke="none" />
  <text x="220" y="430" font-size="12" text-anchor="middle" stroke="none" fill="#666">👤 Personal</text>
  <!-- chip: Other -->
  <rect x="268" y="412" width="64" height="28" rx="14" fill="#e6e6e6" stroke="none" />
  <text x="300" y="430" font-size="12" text-anchor="middle" stroke="none" fill="#666">Other</text>

  <!-- field: EMI Amount -->
  <text x="24" y="468" font-size="12" font-weight="600" stroke="none" fill="#666">EMI AMOUNT</text>
  <rect x="24" y="476" width="342" height="56" rx="10" fill="#f4f4f4" stroke="#000" stroke-width="1.5" />
  <!-- ₹ prefix -->
  <text x="44" y="511" font-size="20" stroke="none" fill="#666">₹</text>
  <text x="72" y="515" font-size="28" font-weight="700" stroke="none" fill="#000">32,450</text>
  <!-- cursor blink -->
  <line x1="182" y1="492" x2="182" y2="520" stroke="#000" stroke-width="2" />

  <!-- field: Due Date -->
  <text x="24" y="556" font-size="12" font-weight="600" stroke="none" fill="#666">MONTHLY DUE DATE</text>
  <rect x="24" y="564" width="342" height="44" rx="10" fill="#f4f4f4" stroke="#e5e5e0" stroke-width="1" />
  <text x="40" y="591" font-size="14" stroke="none" fill="#000">1st of every month</text>
  <!-- calendar icon -->
  <g transform="translate(326, 572)">
    <rect width="28" height="28" rx="4" fill="none" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="8" x2="28" y2="8" stroke="#000" stroke-width="1.5" />
    <text x="14" y="22" font-size="11" text-anchor="middle" stroke="none" fill="#000">30</text>
  </g>

  <!-- frequency selector -->
  <text x="24" y="632" font-size="12" font-weight="600" stroke="none" fill="#666">REMINDER FREQUENCY</text>
  <!-- chip: Daily -->
  <rect x="24" y="640" width="64" height="28" rx="14" fill="#e6e6e6" stroke="none" />
  <text x="56" y="658" font-size="12" text-anchor="middle" stroke="none" fill="#666">Daily</text>
  <!-- chip: Weekly -->
  <rect x="96" y="640" width="64" height="28" rx="14" fill="#e6e6e6" stroke="none" />
  <text x="128" y="658" font-size="12" text-anchor="middle" stroke="none" fill="#666">Weekly</text>
  <!-- chip: Monthly (selected) -->
  <rect x="168" y="640" width="72" height="28" rx="14" fill="#000" stroke="none" />
  <text x="204" y="658" font-size="12" text-anchor="middle" stroke="none" fill="#fff">Monthly</text>

  <!-- Save button -->
  <rect x="24" y="684" width="342" height="52" rx="14" fill="#000" stroke="none" />
  <text x="195" y="716" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Save Reminder</text>

  <!-- home indicator bar (phone gesture nav) -->
  <rect x="155" y="824" width="80" height="4" rx="2" fill="#e6e6e6" stroke="none" />

  <!-- annotations -->
  <g data-region="annotations">
    <circle cx="370" cy="380" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="384" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="370" cy="440" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="444" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="370" cy="508" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="512" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="370" cy="588" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="592" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
    <circle cx="370" cy="660" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="370" y="664" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text>
  </g>
</svg>
