<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · lock screen notification preview -->

  <!-- lock screen background (gradient placeholder) -->
  <rect width="390" height="844" fill="#1a1a2e" stroke="none" />
  <!-- subtle texture lines -->
  <line x1="0" y1="200" x2="390" y2="200" stroke="#2a2a4e" stroke-width="0.5" />
  <line x1="0" y1="400" x2="390" y2="400" stroke="#2a2a4e" stroke-width="0.5" />
  <line x1="0" y1="600" x2="390" y2="600" stroke="#2a2a4e" stroke-width="0.5" />

  <!-- status bar (white on dark) -->
  <text x="16" y="32" font-size="12" stroke="none" fill="#fff">9:41</text>
  <rect x="330" y="16" width="44" height="16" rx="3" fill="none" stroke="#fff" stroke-width="1.5" />
  <rect x="332" y="19" width="32" height="10" rx="1" fill="#fff" stroke="none" />
  <rect x="376" y="20" width="4" height="6" rx="1" fill="#fff" stroke="none" />

  <!-- big clock -->
  <text x="195" y="136" font-size="72" font-weight="200" text-anchor="middle" stroke="none" fill="#fff">9:41</text>
  <text x="195" y="168" font-size="16" text-anchor="middle" stroke="none" fill="#ccc">Monday, June 30</text>

  <!-- notification card -->
  <rect x="16" y="208" width="358" height="160" rx="20" fill="#fff" fill-opacity="0.92" stroke="none" />

  <!-- app icon row -->
  <rect x="32" y="228" width="32" height="32" rx="8" fill="#e6e6e6" stroke="none" />
  <!-- ₹ in icon box -->
  <text x="48" y="249" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹</text>
  <!-- app name -->
  <text x="72" y="240" font-size="12" font-weight="600" stroke="none" fill="#666">EMI Reminder</text>
  <text x="72" y="255" font-size="11" stroke="none" fill="#999">now · via Notification</text>
  <!-- dismiss X -->
  <text x="352" y="244" font-size="20" text-anchor="end" stroke="none" fill="#aaa">∨</text>

  <!-- notification title -->
  <text x="32" y="282" font-size="16" font-weight="700" stroke="none" fill="#000">SBI Home Loan due tomorrow!</text>

  <!-- notification body -->
  <text x="32" y="302" font-size="13" stroke="none" fill="#555">₹32,450 due on 1st July. Don't miss your</text>
  <text x="32" y="320" font-size="13" stroke="none" fill="#555">payment to avoid late charges.</text>

  <!-- divider line -->
  <line x1="32" y1="336" x2="358" y2="336" stroke="#e5e5e0" stroke-width="1" />

  <!-- action buttons -->
  <rect x="32" y="344" width="136" height="32" rx="8" fill="#000" stroke="none" />
  <text x="100" y="364" font-size="13" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Pay Now →</text>
  <rect x="184" y="344" width="136" height="32" rx="8" fill="#e6e6e6" stroke="none" />
  <text x="252" y="364" font-size="13" text-anchor="middle" stroke="none" fill="#000">Remind Later</text>

  <!-- second notification (older) -->
  <rect x="24" y="384" width="342" height="80" rx="16" fill="#fff" fill-opacity="0.75" stroke="none" />
  <rect x="40" y="400" width="28" height="28" rx="6" fill="#e6e6e6" stroke="none" />
  <text x="54" y="419" font-size="13" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹</text>
  <text x="80" y="412" font-size="13" font-weight="600" stroke="none" fill="#000">HDFC Car Loan — Due in 12 days</text>
  <text x="80" y="430" font-size="12" stroke="none" fill="#777">₹10,941 due on 12th July</text>
  <text x="80" y="450" font-size="11" stroke="none" fill="#999">2 hours ago</text>

  <!-- third notification collapsed -->
  <rect x="32" y="476" width="326" height="48" rx="12" fill="#fff" fill-opacity="0.55" stroke="none" />
  <text x="56" y="505" font-size="13" stroke="none" fill="#555">Axis Personal Loan · ₹8,240 · Due in 18d</text>

  <!-- lock screen prompt -->
  <text x="195" y="600" font-size="13" text-anchor="middle" stroke="none" fill="#aaa">Swipe up to unlock</text>

  <!-- swipe line -->
  <line x1="155" y1="616" x2="235" y2="616" stroke="#666" stroke-width="1.5" />
  <text x="195" y="634" font-size="18" text-anchor="middle" stroke="none" fill="#888">↑</text>

  <!-- home indicator -->
  <rect x="155" y="820" width="80" height="4" rx="2" fill="#555" stroke="none" />

  <!-- annotations -->
  <g data-region="annotations">
    <circle cx="26" cy="220" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="26" y="224" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="26" cy="282" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="26" y="286" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="26" cy="360" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="26" y="364" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="26" cy="424" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="26" y="428" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
  </g>
</svg>
