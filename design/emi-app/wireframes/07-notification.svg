<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="lockBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#lockBg)"/>
  <!-- blurred bg circles -->
  <circle cx="320" cy="180" r="140" fill="#312E81" opacity="0.3"/>
  <circle cx="60" cy="680" r="120" fill="#1E1B4B" opacity="0.4"/>

  <!-- status bar -->
  <text x="16" y="32" font-size="12" fill="#94A3B8">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#475569"/>

  <!-- lock icon -->
  <rect x="180" y="130" width="30" height="22" rx="4" fill="none" stroke="#64748B" stroke-width="2"/>
  <rect x="176" y="116" width="38" height="28" rx="8" fill="none" stroke="#64748B" stroke-width="2"/>
  <!-- time -->
  <text x="195" y="226" font-size="54" font-weight="800" text-anchor="middle" fill="#FFFFFF">9:41</text>
  <text x="195" y="256" font-size="16" text-anchor="middle" fill="#94A3B8">Monday, 30 June 2026</text>

  <!-- notification card: OVERDUE -->
  <rect x="16" y="304" width="358" height="110" rx="20" fill="#1E293B" opacity="0.9"/>
  <!-- app icon -->
  <rect x="28" y="316" width="36" height="36" rx="10" fill="url(#pill1)"/>
  <text x="46" y="339" font-size="18" text-anchor="middle" fill="#FFFFFF">₹</text>
  <text x="74" y="330" font-size="12" font-weight="700" fill="#FFFFFF">EMI Reminder</text>
  <text x="300" y="330" font-size="11" fill="#64748B">now</text>
  <!-- notification body -->
  <text x="28" y="358" font-size="15" font-weight="700" fill="#FFFFFF">⚠ EMI Due Today!</text>
  <text x="28" y="378" font-size="13" fill="#94A3B8">SBI Home Loan: ₹32,450 due on 30 Jun</text>
  <!-- action chips -->
  <rect x="28" y="390" width="80" height="26" rx="13" fill="#4F46E5"/>
  <text x="68" y="407" font-size="11" font-weight="600" text-anchor="middle" fill="#FFFFFF">Pay Now</text>
  <rect x="116" y="390" width="80" height="26" rx="13" fill="#374151"/>
  <text x="156" y="407" font-size="11" font-weight="600" text-anchor="middle" fill="#E5E7EB">Snooze 1h</text>
  <rect x="204" y="390" width="80" height="26" rx="13" fill="#374151"/>
  <text x="244" y="407" font-size="11" font-weight="600" text-anchor="middle" fill="#E5E7EB">Dismiss</text>

  <!-- notification card: UPCOMING -->
  <rect x="16" y="428" width="358" height="88" rx="20" fill="#1E293B" opacity="0.85"/>
  <rect x="28" y="440" width="36" height="36" rx="10" fill="#0891B2"/>
  <text x="46" y="463" font-size="18" text-anchor="middle" fill="#FFFFFF">₹</text>
  <text x="74" y="454" font-size="12" font-weight="700" fill="#FFFFFF">EMI Reminder</text>
  <text x="300" y="454" font-size="11" fill="#64748B">2 min ago</text>
  <text x="28" y="480" font-size="15" font-weight="700" fill="#FFFFFF">HDFC Car Loan — 5 days left</text>
  <text x="28" y="500" font-size="13" fill="#94A3B8">₹10,941 due on 5 Jul 2026</text>

  <!-- expanded rich notification band -->
  <rect x="16" y="530" width="358" height="130" rx="20" fill="#1E293B" opacity="0.8"/>
  <text x="195" y="558" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">This month's EMI Summary</text>
  <!-- progress bars -->
  <text x="28" y="582" font-size="11" fill="#A5B4FC">Home Loan</text>
  <rect x="28" y="588" width="240" height="8" rx="4" fill="#374151"/>
  <rect x="28" y="588" width="100" height="8" rx="4" fill="#4F46E5"/>
  <text x="280" y="596" font-size="11" fill="#FFFFFF">₹32,450</text>

  <text x="28" y="614" font-size="11" fill="#A5B4FC">Car Loan</text>
  <rect x="28" y="620" width="240" height="8" rx="4" fill="#374151"/>
  <rect x="28" y="620" width="160" height="8" rx="4" fill="#0891B2"/>
  <text x="280" y="628" font-size="11" fill="#FFFFFF">₹10,941</text>

  <text x="28" y="646" font-size="11" fill="#94A3B8">Total this month: </text>
  <text x="150" y="646" font-size="11" font-weight="700" fill="#FFFFFF">₹43,391</text>

  <!-- swipe hint -->
  <text x="195" y="730" font-size="13" text-anchor="middle" fill="#475569">swipe up to unlock</text>
  <rect x="171" y="748" width="48" height="4" rx="2" fill="#475569"/>
</svg>
