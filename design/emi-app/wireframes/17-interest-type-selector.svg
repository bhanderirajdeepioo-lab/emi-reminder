<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="sparkA1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#EEF2FF"/>

  <!-- Status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>

  <!-- Header — full-screen modal, not embedded in calculator -->
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)"/>
  <text x="20" y="84" font-size="20" fill="#FFFFFF">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">Interest Type</text>

  <!-- Subtitle / explanation -->
  <rect x="16" y="120" width="358" height="44" rx="12" fill="#312E81"/>
  <text x="195" y="138" font-size="12" text-anchor="middle" fill="#C7D2FE">How interest is calculated affects your</text>
  <text x="195" y="156" font-size="12" font-weight="600" text-anchor="middle" fill="#E0E7FF">total cost — choose carefully.</text>

  <!-- Card A: Reducing Balance — SELECTED (full width) -->
  <rect x="16" y="180" width="358" height="198" rx="18" fill="#4F46E5"/>
  <!-- selected border glow -->
  <rect x="13" y="177" width="364" height="204" rx="20" fill="none" stroke="#818CF8" stroke-width="2.5"/>

  <!-- Recommended badge -->
  <rect x="238" y="192" width="120" height="24" rx="12" fill="#FFFFFF"/>
  <text x="298" y="208" font-size="11" font-weight="700" text-anchor="middle" fill="#4F46E5">✓ Recommended</text>

  <text x="32" y="218" font-size="16" font-weight="800" fill="#FFFFFF">Reducing Balance</text>
  <text x="32" y="238" font-size="12" fill="#A5B4FC">Diminishing / EMI method · interest on outstanding</text>

  <!-- Sparkline — reducing curve -->
  <polyline points="32,300 62,290 92,278 122,265 152,250 182,234 212,218 242,206 272,198 302,194 332,192 358,191"
            fill="none" stroke="#A5B4FC" stroke-width="1.5" opacity="0.6"/>
  <polyline points="32,320 62,310 92,298 122,285 152,270 182,254 212,238 242,226 272,218 302,214 332,212 358,211 358,320 32,320"
            fill="#3730A3" opacity="0.4" stroke="none"/>
  <polyline points="32,300 62,290 92,278 122,265 152,250 182,234 212,218 242,206 272,198 302,194 332,192 358,191"
            fill="none" stroke="#818CF8" stroke-width="2"/>

  <!-- Metrics row -->
  <rect x="32" y="328" width="155" height="38" rx="10" fill="#3730A3"/>
  <text x="40" y="343" font-size="10" fill="#A5B4FC">Monthly EMI</text>
  <text x="40" y="360" font-size="14" font-weight="800" fill="#FFFFFF">₹ 32,450</text>

  <rect x="203" y="328" width="155" height="38" rx="10" fill="#3730A3"/>
  <text x="211" y="343" font-size="10" fill="#A5B4FC">Total Interest</text>
  <text x="211" y="360" font-size="14" font-weight="800" fill="#C7D2FE">₹ 28,08,093</text>

  <!-- Checkmark -->
  <circle cx="366" cy="196" r="14" fill="#FFFFFF"/>
  <text x="366" y="201" font-size="14" text-anchor="middle" fill="#4F46E5">✓</text>

  <!-- Card B: Flat Rate (full width) -->
  <rect x="16" y="396" width="358" height="198" rx="18" fill="#FFFFFF"/>

  <text x="32" y="434" font-size="16" font-weight="800" fill="#1E293B">Flat Rate</text>
  <text x="32" y="454" font-size="12" fill="#64748B">Fixed on original principal · interest does not reduce</text>

  <!-- Sparkline — flat line -->
  <line x1="32" y1="520" x2="358" y2="520" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 3"/>
  <polyline points="32,530 82,530 132,530 182,530 232,530 282,530 332,530 358,530"
            fill="none" stroke="#CBD5E1" stroke-width="1.5" opacity="0.6"/>
  <rect x="32" y="505" width="326" height="30" rx="4" fill="#F8FAFC" opacity="0.6"/>
  <polyline points="32,520 82,520 132,520 182,520 232,520 282,520 332,520 358,520"
            fill="none" stroke="#94A3B8" stroke-width="2"/>

  <!-- Metrics row -->
  <rect x="32" y="544" width="155" height="38" rx="10" fill="#F8FAFC"/>
  <text x="40" y="559" font-size="10" fill="#94A3B8">Monthly EMI</text>
  <text x="40" y="576" font-size="14" font-weight="800" fill="#DC2626">₹ 52,083</text>

  <rect x="203" y="544" width="155" height="38" rx="10" fill="#F8FAFC"/>
  <text x="211" y="559" font-size="10" fill="#94A3B8">Total Interest</text>
  <text x="211" y="576" font-size="14" font-weight="800" fill="#DC2626">₹ 47,00,000</text>

  <!-- Cost warning badge -->
  <rect x="32" y="590" width="180" height="22" rx="11" fill="#FEF2F2"/>
  <text x="122" y="605" font-size="11" font-weight="600" text-anchor="middle" fill="#DC2626">⚠ ~1.8× more expensive</text>

  <!-- CTA — label changes to reflect current selection -->
  <rect x="16" y="614" width="358" height="56" rx="16" fill="#4F46E5"/>
  <text x="195" y="649" font-size="16" font-weight="700" text-anchor="middle" fill="#FFFFFF">Apply Reducing Balance</text>
  <text x="195" y="666" font-size="11" text-anchor="middle" fill="#A5B4FC">CTA label reflects current selection</text>

  <!-- Bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <rect x="153" y="802" width="84" height="34" rx="17" fill="#EEF2FF"/>
  <text x="66" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Dashboard</text>
  <text x="195" y="824" font-size="11" font-weight="700" text-anchor="middle" fill="#4F46E5">Calculator</text>
  <text x="324" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Reminders</text>

  <!-- Design decision annotation -->
  <rect x="0" y="752" width="390" height="40" fill="#FFF7ED" opacity="0.95"/>
  <text x="16" y="770" font-size="10" font-weight="700" fill="#D97706">DESIGN DECISION (updated 2026-06-30):</text>
  <text x="16" y="785" font-size="10" fill="#92400E">Full-screen modal adopted over inline cards. Live per-card metrics replace the amber comparison card.</text>
</svg>
