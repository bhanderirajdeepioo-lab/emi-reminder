<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · interest type selector (flat vs reducing balance) on calculator screen -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />

  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="84" font-size="20" stroke="none" fill="#000">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" stroke="none" fill="#000">EMI Calculator</text>

  <!-- loan type tabs -->
  <rect x="16" y="112" width="358" height="36" rx="8" fill="#e6e6e6" stroke="none" />
  <rect x="18" y="114" width="112" height="32" rx="6" fill="#000" stroke="none" />
  <text x="74" y="134" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Home Loan</text>
  <text x="195" y="134" font-size="12" text-anchor="middle" stroke="none" fill="#666">Car Loan</text>
  <text x="314" y="134" font-size="12" text-anchor="middle" stroke="none" fill="#666">Personal</text>

  <!-- loan amount field -->
  <rect x="16" y="160" width="358" height="72" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="184" font-size="11" stroke="none" fill="#666">Loan Amount</text>
  <text x="36" y="218" font-size="28" font-weight="700" stroke="none" fill="#000">₹ 50,00,000</text>
  <!-- slider track -->
  <rect x="36" y="226" width="322" height="4" rx="2" fill="#e6e6e6" stroke="none" />
  <rect x="36" y="226" width="200" height="4" rx="2" fill="#000" stroke="none" />
  <circle cx="236" cy="228" r="8" fill="#000" stroke="#fff" stroke-width="2" />

  <!-- interest rate field -->
  <rect x="16" y="244" width="358" height="64" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="268" font-size="11" stroke="none" fill="#666">Interest Rate (%)</text>
  <rect x="36" y="276" width="36" height="28" rx="6" fill="#e6e6e6" stroke="none" />
  <text x="54" y="295" font-size="16" text-anchor="middle" stroke="none" fill="#000">−</text>
  <text x="195" y="296" font-size="20" font-weight="700" text-anchor="middle" stroke="none" fill="#000">8.50</text>
  <rect x="318" y="276" width="36" height="28" rx="6" fill="#e6e6e6" stroke="none" />
  <text x="336" y="295" font-size="16" text-anchor="middle" stroke="none" fill="#000">+</text>

  <!-- tenure field -->
  <rect x="16" y="320" width="358" height="52" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="344" font-size="11" stroke="none" fill="#666">Tenure</text>
  <text x="36" y="362" font-size="16" font-weight="600" stroke="none" fill="#000">20 years</text>
  <text x="280" y="362" font-size="13" stroke="none" fill="#666">(240 months)</text>

  <!-- ===== INTEREST TYPE SECTION ===== -->
  <text x="16" y="396" font-size="12" font-weight="700" stroke="none" fill="#666">INTEREST TYPE</text>
  <!-- info icon -->
  <circle cx="160" cy="390" r="8" fill="none" stroke="#aaa" stroke-width="1" />
  <text x="160" y="394" font-size="10" text-anchor="middle" stroke="none" fill="#aaa">i</text>

  <!-- option A: Reducing Balance (selected) -->
  <rect x="16" y="404" width="170" height="116" rx="12" fill="#000" stroke="none" />
  <text x="32" y="428" font-size="13" font-weight="700" stroke="none" fill="#fff">Reducing Balance</text>
  <text x="32" y="446" font-size="11" stroke="none" fill="#aaa">(Diminishing)</text>
  <!-- small bar chart showing reducing interest -->
  <rect x="32" y="456" width="8" height="36" rx="2" fill="#fff" stroke="none" />
  <rect x="46" y="462" width="8" height="30" rx="2" fill="#aaa" stroke="none" />
  <rect x="60" y="468" width="8" height="24" rx="2" fill="#aaa" stroke="none" />
  <rect x="74" y="474" width="8" height="18" rx="2" fill="#aaa" stroke="none" />
  <rect x="88" y="480" width="8" height="12" rx="2" fill="#aaa" stroke="none" />
  <text x="32" y="510" font-size="10" stroke="none" fill="#aaa">Interest on outstanding</text>
  <!-- selected check -->
  <circle cx="168" cy="416" r="10" fill="#fff" stroke="none" />
  <text x="168" y="421" font-size="12" text-anchor="middle" stroke="none" fill="#000">✓</text>

  <!-- option B: Flat Rate -->
  <rect x="204" y="404" width="170" height="116" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="220" y="428" font-size="13" font-weight="700" stroke="none" fill="#000">Flat Rate</text>
  <text x="220" y="446" font-size="11" stroke="none" fill="#666">Fixed on original</text>
  <!-- small bar chart showing flat interest -->
  <rect x="220" y="456" width="8" height="36" rx="2" fill="#e6e6e6" stroke="none" />
  <rect x="234" y="456" width="8" height="36" rx="2" fill="#e6e6e6" stroke="none" />
  <rect x="248" y="456" width="8" height="36" rx="2" fill="#e6e6e6" stroke="none" />
  <rect x="262" y="456" width="8" height="36" rx="2" fill="#e6e6e6" stroke="none" />
  <rect x="276" y="456" width="8" height="36" rx="2" fill="#e6e6e6" stroke="none" />
  <text x="220" y="510" font-size="10" stroke="none" fill="#888">Interest on original principal</text>

  <!-- comparison info card -->
  <rect x="16" y="532" width="358" height="64" rx="10" fill="#f8f8f4" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="556" font-size="12" stroke="none" fill="#000">⚠  Same rate, different EMI amounts</text>
  <text x="36" y="574" font-size="11" stroke="none" fill="#666">Reducing: ₹32,450/mo · Flat: ₹52,083/mo at 8.5%</text>

  <!-- live preview -->
  <rect x="16" y="608" width="358" height="60" rx="10" fill="#e6e6e6" stroke="none" />
  <text x="36" y="632" font-size="12" stroke="none" fill="#666">Monthly EMI (Reducing Balance)</text>
  <text x="36" y="658" font-size="24" font-weight="700" stroke="none" fill="#000">₹ 32,450</text>

  <!-- Calculate CTA -->
  <rect x="16" y="684" width="358" height="56" rx="12" fill="#000" stroke="none" />
  <text x="195" y="718" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Calculate</text>

  <!-- bottom nav bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <g transform="translate(183, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Calculator</text>
  </g>
  <text x="335" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <circle cx="365" cy="332" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="336" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
  <circle cx="195" cy="462" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="195" y="466" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
  <circle cx="365" cy="564" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="568" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  <circle cx="365" cy="636" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="640" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
</svg>
