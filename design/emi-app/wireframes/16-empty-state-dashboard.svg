<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="illus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#EEF2FF"/>
  <!-- status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>
  <!-- header -->
  <rect x="0" y="48" width="390" height="100" fill="url(#hdr)"/>
  <circle cx="52" cy="98" r="26" fill="#312E81"/>
  <text x="52" y="104" font-size="13" font-weight="700" text-anchor="middle" fill="#E0E7FF">RB</text>
  <text x="92" y="84" font-size="12" fill="#C7D2FE">Good morning,</text>
  <text x="92" y="106" font-size="20" font-weight="700" fill="#FFFFFF">Raj Bhanderi</text>
  <circle cx="358" cy="98" r="18" fill="#3730A3"/>
  <text x="358" y="104" font-size="16" text-anchor="middle" fill="#E0E7FF">🔔</text>

  <!-- empty illustration -->
  <circle cx="195" cy="330" r="100" fill="url(#illus)"/>
  <circle cx="195" cy="330" r="68" fill="#FFFFFF"/>
  <!-- document icon -->
  <rect x="166" y="300" width="58" height="72" rx="6" fill="#E0E7FF"/>
  <rect x="166" y="300" width="58" height="72" rx="6" fill="none" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="195" y="330" font-size="28" text-anchor="middle" fill="#4F46E5">₹</text>
  <text x="195" y="355" font-size="10" text-anchor="middle" fill="#6366F1">EMI</text>
  <!-- sparkle dots -->
  <circle cx="120" cy="270" r="5" fill="#818CF8"/>
  <circle cx="280" cy="260" r="7" fill="#C084FC"/>
  <circle cx="100" cy="370" r="4" fill="#A5B4FC"/>
  <circle cx="290" cy="400" r="6" fill="#818CF8"/>

  <!-- heading -->
  <text x="195" y="462" font-size="24" font-weight="800" text-anchor="middle" fill="#1E293B">No Loans Yet!</text>
  <text x="195" y="490" font-size="14" text-anchor="middle" fill="#64748B">Add your first loan to start tracking</text>
  <text x="195" y="508" font-size="14" text-anchor="middle" fill="#64748B">EMIs and get smart reminders.</text>

  <!-- action cards -->
  <rect x="16" y="530" width="172" height="100" rx="16" fill="#FFFFFF"/>
  <rect x="58" y="546" width="44" height="44" rx="12" fill="#EEF2FF"/>
  <text x="80" y="573" font-size="24" text-anchor="middle" fill="#4F46E5">⚡</text>
  <text x="102" y="614" font-size="13" font-weight="700" text-anchor="middle" fill="#1E293B">Calculate EMI</text>
  <text x="102" y="628" font-size="11" text-anchor="middle" fill="#64748B">Try the calculator</text>

  <rect x="202" y="530" width="172" height="100" rx="16" fill="#4F46E5"/>
  <rect x="244" y="546" width="44" height="44" rx="12" fill="#312E81"/>
  <text x="266" y="573" font-size="24" text-anchor="middle" fill="#FFFFFF">+</text>
  <text x="288" y="614" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">Add Loan</text>
  <text x="288" y="628" font-size="11" text-anchor="middle" fill="#A5B4FC">Start tracking</text>

  <!-- SMS import prompt -->
  <rect x="16" y="642" width="358" height="56" rx="16" fill="#FFFFFF"/>
  <text x="40" y="666" font-size="20">💬</text>
  <text x="70" y="662" font-size="14" font-weight="600" fill="#1E293B">Detect from SMS</text>
  <text x="70" y="680" font-size="12" fill="#64748B">Auto-import EMIs from bank messages</text>
  <text x="356" y="672" font-size="18" text-anchor="end" fill="#4F46E5">›</text>

  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <rect x="24" y="802" width="84" height="34" rx="17" fill="#EEF2FF"/>
  <text x="66" y="824" font-size="11" font-weight="700" text-anchor="middle" fill="#4F46E5">Dashboard</text>
  <text x="195" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Calculator</text>
  <text x="324" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Reminders</text>
</svg>
