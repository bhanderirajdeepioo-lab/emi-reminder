<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · loan detail screen -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#000" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#aaa">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#666" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#666" stroke="none" />

  <!-- hero header card (dark, expanded) -->
  <rect x="0" y="48" width="390" height="220" fill="#000" stroke="none" />
  <!-- back + menu -->
  <text x="20" y="84" font-size="20" stroke="none" fill="#fff">←</text>
  <text x="362" y="84" font-size="20" stroke="none" fill="#fff">⋮</text>
  <!-- loan label -->
  <rect x="16" y="96" width="88" height="22" rx="11" fill="#1a1a1a" stroke="#333" stroke-width="1" />
  <text x="60" y="111" font-size="11" text-anchor="middle" stroke="none" fill="#aaa">🏠  Home</text>
  <!-- loan name & bank -->
  <text x="16" y="148" font-size="22" font-weight="700" stroke="none" fill="#fff">SBI Home Loan</text>
  <text x="16" y="172" font-size="14" stroke="none" fill="#aaa">State Bank of India · Acc **4521</text>
  <!-- EMI amount -->
  <text x="16" y="210" font-size="11" stroke="none" fill="#888">Monthly EMI</text>
  <text x="16" y="236" font-size="28" font-weight="700" stroke="none" fill="#fff">₹ 32,450</text>
  <!-- next due badge -->
  <rect x="260" y="216" width="112" height="28" rx="6" fill="#333" stroke="none" />
  <text x="316" y="234" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Due in 3 days</text>

  <!-- progress ring + stats -->
  <rect x="0" y="268" width="390" height="128" fill="#fff" stroke="none" />
  <line x1="0" y1="396" x2="390" y2="396" stroke="#e5e5e0" stroke-width="1" />
  <!-- ring (SVG simplified as 3 arcs of circle) -->
  <circle cx="70" cy="332" r="44" fill="none" stroke="#e6e6e6" stroke-width="10" />
  <circle cx="70" cy="332" r="44" fill="none" stroke="#000" stroke-width="10"
          stroke-dasharray="138 138" stroke-dashoffset="0" />
  <!-- ring label -->
  <text x="70" y="328" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">40%</text>
  <text x="70" y="344" font-size="10" text-anchor="middle" stroke="none" fill="#666">paid</text>
  <!-- stats columns -->
  <line x1="165" y1="280" x2="165" y2="384" stroke="#e5e5e0" stroke-width="1" />
  <line x1="265" y1="280" x2="265" y2="384" stroke="#e5e5e0" stroke-width="1" />
  <text x="215" y="308" font-size="11" text-anchor="middle" stroke="none" fill="#666">Principal</text>
  <text x="215" y="332" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹50L</text>
  <text x="215" y="352" font-size="11" text-anchor="middle" stroke="none" fill="#666">@ 8.5% · 20 yr</text>
  <text x="325" y="308" font-size="11" text-anchor="middle" stroke="none" fill="#666">Total Interest</text>
  <text x="325" y="332" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹52.8L</text>
  <text x="325" y="352" font-size="11" text-anchor="middle" stroke="none" fill="#666">₹20.2L paid</text>

  <!-- next payment card -->
  <rect x="16" y="408" width="358" height="72" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <rect x="16" y="408" width="4" height="72" rx="2" fill="#000" stroke="none" />
  <text x="36" y="432" font-size="12" stroke="none" fill="#666">Next payment — 3 Jul 2026</text>
  <text x="36" y="456" font-size="18" font-weight="700" stroke="none" fill="#000">₹ 32,450</text>
  <!-- pay now button inside card -->
  <rect x="268" y="422" width="90" height="36" rx="8" fill="#000" stroke="none" />
  <text x="313" y="445" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Pay Now</text>

  <!-- action buttons row -->
  <rect x="16" y="496" width="104" height="52" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="68" y="518" font-size="18" text-anchor="middle" stroke="none" fill="#000">✏</text>
  <text x="68" y="538" font-size="11" text-anchor="middle" stroke="none" fill="#000">Edit</text>
  <rect x="143" y="496" width="104" height="52" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="195" y="518" font-size="18" text-anchor="middle" stroke="none" fill="#000">📊</text>
  <text x="195" y="538" font-size="11" text-anchor="middle" stroke="none" fill="#000">Schedule</text>
  <rect x="270" y="496" width="104" height="52" rx="10" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="322" y="518" font-size="18" text-anchor="middle" stroke="none" fill="#000">💸</text>
  <text x="322" y="538" font-size="11" text-anchor="middle" stroke="none" fill="#000">Prepay</text>

  <!-- payment history section -->
  <text x="16" y="576" font-size="12" font-weight="700" stroke="none" fill="#666">PAYMENT HISTORY</text>

  <!-- history row 1 -->
  <rect x="16" y="584" width="358" height="60" rx="0" fill="#fff" stroke="none" />
  <line x1="16" y1="644" x2="374" y2="644" stroke="#f0f0f0" stroke-width="1" />
  <text x="36" y="608" font-size="13" font-weight="600" stroke="none" fill="#000">Jun 2026</text>
  <text x="36" y="628" font-size="12" stroke="none" fill="#666">Paid on 1 Jun</text>
  <text x="340" y="608" font-size="13" font-weight="700" text-anchor="end" stroke="none" fill="#000">₹32,450</text>
  <rect x="320" y="618" width="40" height="18" rx="9" fill="#e6e6e6" stroke="none" />
  <text x="340" y="631" font-size="10" text-anchor="middle" stroke="none" fill="#000">Paid</text>

  <!-- history row 2 -->
  <rect x="16" y="644" width="358" height="60" rx="0" fill="#fff" stroke="none" />
  <line x1="16" y1="704" x2="374" y2="704" stroke="#f0f0f0" stroke-width="1" />
  <text x="36" y="668" font-size="13" font-weight="600" stroke="none" fill="#000">May 2026</text>
  <text x="36" y="688" font-size="12" stroke="none" fill="#666">Paid on 2 May</text>
  <text x="340" y="668" font-size="13" font-weight="700" text-anchor="end" stroke="none" fill="#000">₹32,450</text>
  <rect x="320" y="678" width="40" height="18" rx="9" fill="#e6e6e6" stroke="none" />
  <text x="340" y="691" font-size="10" text-anchor="middle" stroke="none" fill="#000">Paid</text>

  <!-- history row 3 -->
  <rect x="16" y="704" width="358" height="60" rx="0" fill="#fff" stroke="none" />
  <text x="36" y="728" font-size="13" font-weight="600" stroke="none" fill="#000">Apr 2026</text>
  <text x="36" y="748" font-size="12" stroke="none" fill="#666">Paid on 30 Apr · Late</text>
  <text x="340" y="728" font-size="13" font-weight="700" text-anchor="end" stroke="none" fill="#000">₹32,450</text>
  <rect x="308" y="738" width="52" height="18" rx="9" fill="#000" stroke="none" />
  <text x="334" y="751" font-size="10" text-anchor="middle" stroke="none" fill="#fff">Late</text>

  <!-- "View full history" -->
  <text x="195" y="788" font-size="13" text-anchor="middle" stroke="none" fill="#000">View full history →</text>

  <!-- bottom nav bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <text x="195" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Calculator</text>
  <text x="335" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <circle cx="364" cy="200" r="12" fill="#000" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="204" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
  <circle cx="20" cy="332" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="20" y="336" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
  <circle cx="364" cy="444" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="448" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  <circle cx="364" cy="614" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="364" y="618" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
</svg>
