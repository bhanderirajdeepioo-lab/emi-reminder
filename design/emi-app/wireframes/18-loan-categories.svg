  <text x="324" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Reminders</text>

  <!-- annotations -->
  <circle cx="374" cy="186" r="12" fill="#EFF6FF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="374" y="190" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">1</text>
  <circle cx="374" cy="426" r="12" fill="#FFFBEB" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="374" y="430" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">2</text>
  <circle cx="374" cy="546" r="12" fill="#ECFEFF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
