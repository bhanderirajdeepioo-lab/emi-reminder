<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · settings screen -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />

  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="84" font-size="20" stroke="none" fill="#000">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Settings</text>

  <!-- ---- Section: Notifications ---- -->
  <text x="20" y="128" font-size="11" font-weight="700" stroke="none" fill="#888">NOTIFICATIONS</text>
  <rect x="0" y="136" width="390" height="188" fill="#fff" stroke="none" />
  <!-- row 1 -->
  <line x1="20" y1="136" x2="390" y2="136" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="162" font-size="14" stroke="none" fill="#000">EMI Reminders</text>
  <text x="20" y="182" font-size="12" stroke="none" fill="#888">Notify before each EMI due date</text>
  <rect x="330" y="152" width="40" height="22" rx="11" fill="#000" stroke="none" />
  <circle cx="360" cy="163" r="9" fill="#fff" stroke="none" />
  <!-- row 2 -->
  <line x1="20" y1="196" x2="390" y2="196" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="222" font-size="14" stroke="none" fill="#000">Advance reminder</text>
  <text x="20" y="242" font-size="12" stroke="none" fill="#888">How many days before due date</text>
  <text x="358" y="230" font-size="14" text-anchor="end" stroke="none" fill="#000">3 days  ›</text>
  <!-- row 3 -->
  <line x1="20" y1="256" x2="390" y2="256" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="282" font-size="14" stroke="none" fill="#000">Reminder time</text>
  <text x="20" y="302" font-size="12" stroke="none" fill="#888">Time of day for notification</text>
  <text x="358" y="290" font-size="14" text-anchor="end" stroke="none" fill="#000">9:00 AM  ›</text>
  <!-- row 4 -->
  <line x1="20" y1="316" x2="390" y2="316" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="342" font-size="14" stroke="none" fill="#000">Overdue alerts</text>
  <rect x="330" y="328" width="40" height="22" rx="11" fill="#000" stroke="none" />
  <circle cx="360" cy="339" r="9" fill="#fff" stroke="none" />
  <line x1="0" y1="360" x2="390" y2="360" stroke="#e5e5e0" stroke-width="1" />

  <!-- ---- Section: Appearance ---- -->
  <text x="20" y="380" font-size="11" font-weight="700" stroke="none" fill="#888">APPEARANCE</text>
  <rect x="0" y="388" width="390" height="128" fill="#fff" stroke="none" />
  <line x1="0" y1="388" x2="390" y2="388" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="414" font-size="14" stroke="none" fill="#000">Theme</text>
  <text x="358" y="414" font-size="14" text-anchor="end" stroke="none" fill="#000">System  ›</text>
  <line x1="20" y1="428" x2="390" y2="428" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="454" font-size="14" stroke="none" fill="#000">Currency symbol</text>
  <text x="358" y="454" font-size="14" text-anchor="end" stroke="none" fill="#000">₹ INR  ›</text>
  <line x1="20" y1="468" x2="390" y2="468" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="494" font-size="14" stroke="none" fill="#000">Language</text>
  <text x="358" y="494" font-size="14" text-anchor="end" stroke="none" fill="#000">English  ›</text>
  <line x1="0" y1="508" x2="390" y2="508" stroke="#e5e5e0" stroke-width="1" />

  <!-- ---- Section: Data ---- -->
  <text x="20" y="528" font-size="11" font-weight="700" stroke="none" fill="#888">DATA</text>
  <rect x="0" y="536" width="390" height="128" fill="#fff" stroke="none" />
  <line x1="0" y1="536" x2="390" y2="536" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="562" font-size="14" stroke="none" fill="#000">Export data (CSV)</text>
  <text x="358" y="562" font-size="18" text-anchor="end" stroke="none" fill="#ccc">›</text>
  <line x1="20" y1="576" x2="390" y2="576" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="602" font-size="14" stroke="none" fill="#000">Backup to Google Drive</text>
  <text x="358" y="602" font-size="18" text-anchor="end" stroke="none" fill="#ccc">›</text>
  <line x1="20" y1="616" x2="390" y2="616" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="642" font-size="14" stroke="none" fill="#000">Restore from backup</text>
  <text x="358" y="642" font-size="18" text-anchor="end" stroke="none" fill="#ccc">›</text>
  <line x1="0" y1="656" x2="390" y2="656" stroke="#e5e5e0" stroke-width="1" />

  <!-- ---- Section: About ---- -->
  <text x="20" y="676" font-size="11" font-weight="700" stroke="none" fill="#888">ABOUT</text>
  <rect x="0" y="684" width="390" height="88" fill="#fff" stroke="none" />
  <line x1="0" y1="684" x2="390" y2="684" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="710" font-size="14" stroke="none" fill="#000">App Version</text>
  <text x="358" y="710" font-size="14" text-anchor="end" stroke="none" fill="#888">2.1.0</text>
  <line x1="20" y1="724" x2="390" y2="724" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="750" font-size="14" stroke="none" fill="#000">Privacy Policy</text>
  <text x="358" y="750" font-size="18" text-anchor="end" stroke="none" fill="#ccc">›</text>
  <line x1="0" y1="764" x2="390" y2="764" stroke="#e5e5e0" stroke-width="1" />

  <!-- bottom nav bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <text x="195" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Calculator</text>
  <text x="335" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <circle cx="365" cy="165" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="169" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
  <circle cx="365" cy="283" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="287" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
  <circle cx="365" cy="494" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="498" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  <circle cx="365" cy="602" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="606" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
</svg>
