<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · splash screen -->

  <!-- dark background -->
  <rect width="390" height="844" fill="#000" stroke="none" />

  <!-- status bar icons (white on dark) -->
  <text x="16" y="28" font-size="12" stroke="none" fill="#fff">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#fff" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#fff" stroke="none" />
  <rect x="378" y="20" width="4" height="6" rx="1" fill="#fff" stroke="none" />

  <!-- logo circle -->
  <circle cx="195" cy="296" r="72" fill="none" stroke="#fff" stroke-width="3" />
  <!-- ₹ symbol -->
  <text x="195" y="312" font-size="48" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">₹</text>

  <!-- app name -->
  <text x="195" y="408" font-size="28" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">EMI Reminder</text>
  <!-- tagline -->
  <text x="195" y="440" font-size="14" text-anchor="middle" stroke="none" fill="#aaa">Your Smart Loan Manager</text>

  <!-- loading dots -->
  <circle cx="171" cy="760" r="5" fill="#fff" stroke="none" />
  <circle cx="195" cy="760" r="5" fill="#444" stroke="none" />
  <circle cx="219" cy="760" r="5" fill="#444" stroke="none" />

  <!-- version text -->
  <text x="195" y="800" font-size="12" text-anchor="middle" stroke="none" fill="#555">v1.0.0</text>

  <!-- annotations -->
  <g data-region="annotations">
    <!-- 1: logo -->
    <circle cx="268" cy="240" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="268" y="244" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <!-- 2: title -->
    <circle cx="316" cy="408" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="316" y="412" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <!-- 3: loading -->
    <circle cx="248" cy="760" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="248" y="764" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  </g>
</svg>
