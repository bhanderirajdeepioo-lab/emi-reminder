<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · portrait mobile · EMI calculator screen -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />
  <rect x="378" y="20" width="4" height="6" rx="1" fill="#000" stroke="none" />

  <!-- top bar -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <text x="195" y="82" font-size="20" font-weight="700" text-anchor="middle" stroke="none" fill="#000">EMI Calculator</text>
  <!-- share icon -->
  <g transform="translate(344, 64)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="#000" stroke-width="1.5" />
    <text x="16" y="21" font-size="14" text-anchor="middle" stroke="none" fill="#000">⟨</text>
  </g>

  <!-- segmented tabs -->
  <rect x="16" y="112" width="358" height="40" rx="20" fill="#e6e6e6" stroke="none" />
  <!-- active tab: Home Loan -->
  <rect x="20" y="116" width="112" height="32" rx="16" fill="#000" stroke="none" />
  <text x="76" y="136" font-size="12" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">🏠 Home</text>
  <!-- inactive tab: Car Loan -->
  <text x="195" y="136" font-size="12" text-anchor="middle" stroke="none" fill="#666">🚗 Car</text>
  <!-- inactive tab: Personal -->
  <text x="315" y="136" font-size="12" text-anchor="middle" stroke="none" fill="#666">👤 Personal</text>

  <!-- form card -->
  <rect x="16" y="168" width="358" height="472" rx="16" fill="#fff" stroke="#e5e5e0" stroke-width="1" />

  <!-- field: Loan Amount -->
  <text x="32" y="200" font-size="12" font-weight="600" stroke="none" fill="#666">LOAN AMOUNT</text>
  <!-- large amount display -->
  <rect x="32" y="208" width="326" height="64" rx="8" fill="#f4f4f4" stroke="#e5e5e0" stroke-width="1" />
  <text x="52" y="248" font-size="14" stroke="none" fill="#666">₹</text>
  <text x="76" y="252" font-size="28" font-weight="700" stroke="none" fill="#000">50,00,000</text>
  <!-- edit icon -->
  <rect x="296" y="224" width="48" height="32" rx="8" fill="#e6e6e6" stroke="none" />
  <text x="320" y="244" font-size="12" text-anchor="middle" stroke="none" fill="#000">Edit</text>

  <!-- slider placeholder -->
  <rect x="32" y="280" width="326" height="4" rx="2" fill="#e6e6e6" stroke="none" />
  <circle cx="162" cy="282" r="10" fill="#000" stroke="#fff" stroke-width="2" />
  <text x="32" y="304" font-size="11" stroke="none" fill="#666">₹ 1L</text>
  <text x="342" y="304" font-size="11" text-anchor="end" stroke="none" fill="#666">₹ 2Cr</text>

  <!-- divider -->
  <line x1="32" y1="320" x2="358" y2="320" stroke="#e5e5e0" stroke-width="1" />

  <!-- field: Interest Rate -->
  <text x="32" y="348" font-size="12" font-weight="600" stroke="none" fill="#666">INTEREST RATE</text>
  <rect x="32" y="356" width="326" height="48" rx="8" fill="#f4f4f4" stroke="#e5e5e0" stroke-width="1" />
  <text x="52" y="386" font-size="24" font-weight="700" stroke="none" fill="#000">8.5</text>
  <text x="108" y="386" font-size="18" stroke="none" fill="#666">% per annum</text>
  <!-- stepper buttons -->
  <rect x="264" y="364" width="40" height="32" rx="6" fill="#e6e6e6" stroke="none" />
  <text x="284" y="384" font-size="18" text-anchor="middle" stroke="none" fill="#000">−</text>
  <rect x="312" y="364" width="40" height="32" rx="6" fill="#000" stroke="none" />
  <text x="332" y="384" font-size="18" text-anchor="middle" stroke="none" fill="#fff">+</text>

  <!-- divider -->
  <line x1="32" y1="416" x2="358" y2="416" stroke="#e5e5e0" stroke-width="1" />

  <!-- field: Loan Tenure -->
  <text x="32" y="444" font-size="12" font-weight="600" stroke="none" fill="#666">LOAN TENURE</text>
  <!-- tenure toggle -->
  <rect x="248" y="432" width="112" height="28" rx="14" fill="#e6e6e6" stroke="none" />
  <rect x="248" y="432" width="56" height="28" rx="14" fill="#000" stroke="none" />
  <text x="276" y="450" font-size="12" text-anchor="middle" stroke="none" fill="#fff">Years</text>
  <text x="332" y="450" font-size="12" text-anchor="middle" stroke="none" fill="#666">Months</text>

  <rect x="32" y="452" width="326" height="48" rx="8" fill="#f4f4f4" stroke="#e5e5e0" stroke-width="1" />
  <text x="52" y="482" font-size="24" font-weight="700" stroke="none" fill="#000">20</text>
  <text x="84" y="482" font-size="18" stroke="none" fill="#666">years (240 months)</text>

  <!-- slider -->
  <rect x="32" y="508" width="326" height="4" rx="2" fill="#e6e6e6" stroke="none" />
  <circle cx="226" cy="510" r="10" fill="#000" stroke="#fff" stroke-width="2" />
  <text x="32" y="528" font-size="11" stroke="none" fill="#666">1 yr</text>
  <text x="342" y="528" font-size="11" text-anchor="end" stroke="none" fill="#666">30 yrs</text>

  <!-- divider -->
  <line x1="32" y1="544" x2="358" y2="544" stroke="#e5e5e0" stroke-width="1" />

  <!-- preview section in card -->
  <text x="32" y="568" font-size="12" font-weight="600" stroke="none" fill="#666">ESTIMATED</text>
  <text x="32" y="592" font-size="12" stroke="none" fill="#666">Monthly EMI</text>
  <text x="32" y="620" font-size="28" font-weight="700" stroke="none" fill="#000">₹ 43,391</text>
  <text x="220" y="596" font-size="12" stroke="none" fill="#666">Total Interest</text>
  <text x="220" y="616" font-size="16" font-weight="600" stroke="none" fill="#000">₹ 54,13,832</text>

  <!-- Calculate CTA button -->
  <rect x="16" y="656" width="358" height="56" rx="16" fill="#000" stroke="none" />
  <text x="195" y="689" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Calculate EMI →</text>

  <!-- View results link -->
  <text x="195" y="736" font-size="14" text-anchor="middle" stroke="none" fill="#666">View Amortization Schedule</text>
  <line x1="138" y1="738" x2="252" y2="738" stroke="#000" stroke-width="1" />

  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <g transform="translate(171, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Calculator</text>
  </g>
  <text x="335" y="828" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <g data-region="annotations">
    <circle cx="355" cy="132" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="136" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="355" cy="240" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="244" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="355" cy="380" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="384" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="355" cy="476" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="480" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
    <circle cx="355" cy="676" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="355" y="680" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text>
  </g>
</svg>
