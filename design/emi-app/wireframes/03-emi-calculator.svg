<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="slider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#EEF2FF"/>
  <!-- status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>
  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)"/>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">EMI Calculator</text>

  <!-- loan type tabs -->
  <rect x="16" y="116" width="358" height="38" rx="10" fill="#312E81"/>
  <rect x="18" y="118" width="116" height="34" rx="8" fill="#FFFFFF"/>
  <text x="76" y="139" font-size="13" font-weight="700" text-anchor="middle" fill="#4F46E5">Home Loan</text>
  <text x="207" y="139" font-size="13" text-anchor="middle" fill="#A5B4FC">Car Loan</text>
  <text x="326" y="139" font-size="13" text-anchor="middle" fill="#A5B4FC">Personal</text>

  <!-- Loan Amount card -->
  <rect x="16" y="166" width="358" height="80" rx="14" fill="#FFFFFF"/>
  <text x="32" y="188" font-size="11" fill="#64748B">Loan Amount</text>
  <text x="32" y="222" font-size="28" font-weight="800" fill="#1E293B">₹ 50,00,000</text>
  <rect x="32" y="234" width="322" height="5" rx="2.5" fill="#E0E7FF"/>
  <rect x="32" y="234" width="200" height="5" rx="2.5" fill="url(#slider)"/>
  <circle cx="232" cy="236" r="9" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Interest Rate card -->
  <rect x="16" y="258" width="358" height="72" rx="14" fill="#FFFFFF"/>
  <text x="32" y="280" font-size="11" fill="#64748B">Interest Rate (%)</text>
  <rect x="32" y="289" width="36" height="30" rx="8" fill="#EEF2FF"/>
  <text x="50" y="309" font-size="18" text-anchor="middle" fill="#4F46E5">−</text>
  <text x="195" y="311" font-size="22" font-weight="800" text-anchor="middle" fill="#1E293B">8.50</text>
  <rect x="322" y="289" width="36" height="30" rx="8" fill="#EEF2FF"/>
  <text x="340" y="309" font-size="18" text-anchor="middle" fill="#4F46E5">+</text>

  <!-- Tenure card -->
  <rect x="16" y="342" width="358" height="72" rx="14" fill="#FFFFFF"/>
  <text x="32" y="364" font-size="11" fill="#64748B">Tenure</text>
  <text x="32" y="396" font-size="20" font-weight="700" fill="#1E293B">20 years</text>
  <text x="230" y="396" font-size="13" fill="#64748B">(240 months)</text>
  <!-- yr/mo toggle -->
  <rect x="308" y="354" width="56" height="28" rx="14" fill="#EEF2FF"/>
  <rect x="308" y="354" width="28" height="28" rx="14" fill="#4F46E5"/>
  <text x="322" y="372" font-size="11" text-anchor="middle" fill="#FFFFFF">Yr</text>
  <text x="350" y="372" font-size="11" text-anchor="middle" fill="#64748B">Mo</text>

  <!-- Interest Type header -->
  <text x="16" y="436" font-size="11" font-weight="700" fill="#64748B">INTEREST TYPE</text>

  <!-- card A — Reducing (selected) -->
  <rect x="16" y="444" width="172" height="108" rx="14" fill="#4F46E5"/>
  <text x="32" y="468" font-size="13" font-weight="700" fill="#FFFFFF">Reducing Balance</text>
  <text x="32" y="484" font-size="11" fill="#A5B4FC">Interest on outstanding</text>
  <rect x="32" y="496" width="9" height="32" rx="2" fill="#FFFFFF"/>
  <rect x="47" y="502" width="9" height="26" rx="2" fill="#A5B4FC"/>
  <rect x="62" y="508" width="9" height="20" rx="2" fill="#A5B4FC"/>
  <rect x="77" y="514" width="9" height="14" rx="2" fill="#A5B4FC"/>
  <circle cx="168" cy="458" r="10" fill="#FFFFFF"/>
  <text x="168" y="463" font-size="11" text-anchor="middle" fill="#4F46E5">✓</text>

  <!-- card B — Flat -->
  <rect x="202" y="444" width="172" height="108" rx="14" fill="#FFFFFF"/>
  <text x="218" y="468" font-size="13" font-weight="700" fill="#1E293B">Flat Rate</text>
  <text x="218" y="484" font-size="11" fill="#64748B">Fixed on original</text>
  <rect x="218" y="496" width="9" height="32" rx="2" fill="#E2E8F0"/>
  <rect x="233" y="496" width="9" height="32" rx="2" fill="#E2E8F0"/>
  <rect x="248" y="496" width="9" height="32" rx="2" fill="#E2E8F0"/>
  <rect x="263" y="496" width="9" height="32" rx="2" fill="#E2E8F0"/>

  <!-- info tip -->
  <rect x="16" y="564" width="358" height="60" rx="14" fill="#FFF7ED"/>
  <text x="32" y="590" font-size="12" fill="#D97706">⚠  Same rate, different EMI amounts</text>
  <text x="32" y="608" font-size="11" fill="#92400E">Reducing: ₹32,450/mo · Flat: ₹52,083/mo</text>

  <!-- CTA -->
  <rect x="16" y="640" width="358" height="56" rx="16" fill="#4F46E5"/>
  <text x="195" y="675" font-size="16" font-weight="700" text-anchor="middle" fill="#FFFFFF">Calculate EMI →</text>

  <!-- bottom nav — 4 tabs with icons -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <!-- Home -->
  <text x="49" y="815" font-size="16" text-anchor="middle" fill="#94A3B8">🏠</text>
  <text x="49" y="834" font-size="9" text-anchor="middle" fill="#94A3B8">Home</text>
  <!-- active: Calculator -->
  <rect x="103" y="798" width="88" height="44" rx="12" fill="#EEF2FF"/>
  <text x="147" y="815" font-size="16" text-anchor="middle" fill="#4F46E5">⚡</text>
  <text x="147" y="834" font-size="9" font-weight="700" text-anchor="middle" fill="#4F46E5">Calculator</text>
  <!-- Reminders -->
  <text x="244" y="815" font-size="16" text-anchor="middle" fill="#94A3B8">🔔</text>
  <text x="244" y="834" font-size="9" text-anchor="middle" fill="#94A3B8">Reminders</text>
  <!-- Finance -->
  <text x="341" y="815" font-size="16" text-anchor="middle" fill="#94A3B8">💰</text>
  <text x="341" y="834" font-size="9" text-anchor="middle" fill="#94A3B8">Finance</text>

  <!-- annotations -->
  <circle cx="365" cy="330" r="12" fill="#FFFFFF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="365" y="334" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">1</text>
  <circle cx="365" cy="460" r="12" fill="#4F46E5" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="365" y="464" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">2</text>
</svg>
