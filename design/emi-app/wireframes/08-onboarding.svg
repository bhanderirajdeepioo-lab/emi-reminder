<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg)"/>
  <!-- ambient blobs -->
  <circle cx="360" cy="120" r="120" fill="#312E81" opacity="0.4"/>
  <circle cx="30" cy="660" r="100" fill="#3B0764" opacity="0.3"/>

  <!-- status bar -->
  <text x="16" y="32" font-size="12" fill="#A5B4FC">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#6366F1"/>

  <!-- step indicator -->
  <circle cx="175" cy="70" r="5" fill="#4F46E5"/>
  <circle cx="195" cy="70" r="7" fill="#E0E7FF"/>
  <circle cx="215" cy="70" r="5" fill="#4F46E5"/>

  <!-- hero illustration placeholder -->
  <circle cx="195" cy="210" r="90" fill="#312E81" opacity="0.5"/>
  <circle cx="195" cy="210" r="64" fill="url(#card)"/>
  <text x="195" y="230" font-size="48" text-anchor="middle" fill="#FFFFFF">🔔</text>

  <!-- heading -->
  <text x="195" y="338" font-size="26" font-weight="800" text-anchor="middle" fill="#E0E7FF">Stay On Top</text>
  <text x="195" y="366" font-size="26" font-weight="800" text-anchor="middle" fill="#E0E7FF">of Every EMI</text>
  <text x="195" y="400" font-size="14" text-anchor="middle" fill="#818CF8">Never miss a payment. Get smart</text>
  <text x="195" y="418" font-size="14" text-anchor="middle" fill="#818CF8">reminders before every due date.</text>

  <!-- permission cards -->
  <rect x="24" y="440" width="342" height="64" rx="16" fill="#312E81" opacity="0.8"/>
  <circle cx="56" cy="472" r="18" fill="#4F46E5"/>
  <text x="56" y="477" font-size="16" text-anchor="middle" fill="#FFFFFF">🔔</text>
  <text x="84" y="464" font-size="14" font-weight="700" fill="#E0E7FF">Notifications</text>
  <text x="84" y="482" font-size="12" fill="#818CF8">Required to send EMI reminders</text>
  <rect x="336" y="460" width="20" height="20" rx="10" fill="#059669"/>
  <text x="346" y="474" font-size="11" text-anchor="middle" fill="#FFFFFF">✓</text>

  <rect x="24" y="516" width="342" height="64" rx="16" fill="#312E81" opacity="0.8"/>
  <circle cx="56" cy="548" r="18" fill="#0891B2"/>
  <text x="56" y="553" font-size="16" text-anchor="middle" fill="#FFFFFF">💬</text>
  <text x="84" y="540" font-size="14" font-weight="700" fill="#E0E7FF">SMS Permission</text>
  <text x="84" y="558" font-size="12" fill="#818CF8">Auto-detect EMI from bank SMS</text>
  <rect x="318" y="536" width="44" height="24" rx="12" fill="#1E293B"/>
  <rect x="318" y="536" width="22" height="24" rx="12" fill="#FFFFFF"/>
  <text x="329" y="552" font-size="10" text-anchor="middle" fill="#1E293B">Off</text>

  <rect x="24" y="592" width="342" height="64" rx="16" fill="#312E81" opacity="0.8"/>
  <circle cx="56" cy="624" r="18" fill="#D97706"/>
  <text x="56" y="629" font-size="16" text-anchor="middle" fill="#FFFFFF">🔒</text>
  <text x="84" y="616" font-size="14" font-weight="700" fill="#E0E7FF">Exact Alarms</text>
  <text x="84" y="634" font-size="12" fill="#818CF8">Precise alarm scheduling (Android 12+)</text>
  <rect x="318" y="612" width="44" height="24" rx="12" fill="#D97706"/>
  <circle cx="352" cy="624" r="10" fill="#FFFFFF"/>

  <!-- CTA -->
  <rect x="24" y="674" width="342" height="52" rx="16" fill="#E0E7FF"/>
  <text x="195" y="705" font-size="15" font-weight="700" text-anchor="middle" fill="#4F46E5">Get Started →</text>

  <text x="195" y="748" font-size="12" text-anchor="middle" fill="#6366F1">Skip for now</text>
</svg>
