<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · onboarding / first launch permissions -->

  <rect width="390" height="844" fill="#000" stroke="none" />

  <!-- status bar (light on dark) -->
  <text x="16" y="32" font-size="12" stroke="none" fill="#aaa">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#666" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#666" stroke="none" />

  <!-- progress dots (step 2 of 3) -->
  <circle cx="175" cy="72" r="4" fill="#333" stroke="none" />
  <circle cx="195" cy="72" r="4" fill="#fff" stroke="none" />
  <circle cx="215" cy="72" r="4" fill="#333" stroke="none" />

  <!-- logo mark -->
  <circle cx="195" cy="160" r="48" fill="none" stroke="#fff" stroke-width="2" />
  <text x="195" y="175" font-size="36" text-anchor="middle" stroke="none" fill="#fff">₹</text>

  <!-- heading -->
  <text x="195" y="244" font-size="24" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Set up permissions</text>
  <text x="195" y="268" font-size="14" text-anchor="middle" stroke="none" fill="#888">Grant access so the app can remind</text>
  <text x="195" y="286" font-size="14" text-anchor="middle" stroke="none" fill="#888">you about upcoming EMIs</text>

  <!-- permission card 1: Notifications -->
  <g transform="translate(24, 316)">
    <rect width="342" height="76" rx="12" fill="#111" stroke="#222" stroke-width="1" />
    <!-- icon -->
    <rect x="16" y="18" width="40" height="40" rx="8" fill="#1a1a1a" stroke="none" />
    <text x="36" y="42" font-size="20" text-anchor="middle" stroke="none" fill="#fff">🔔</text>
    <!-- text -->
    <text x="72" y="36" font-size="14" font-weight="600" stroke="none" fill="#fff">Notifications</text>
    <text x="72" y="54" font-size="12" stroke="none" fill="#888">Required · EMI due reminders</text>
    <!-- toggle ON -->
    <rect x="294" y="24" width="32" height="20" rx="10" fill="#fff" stroke="none" />
    <circle cx="316" cy="34" r="8" fill="#000" stroke="none" />
  </g>

  <!-- permission card 2: SMS -->
  <g transform="translate(24, 404)">
    <rect width="342" height="76" rx="12" fill="#111" stroke="#222" stroke-width="1" />
    <!-- icon -->
    <rect x="16" y="18" width="40" height="40" rx="8" fill="#1a1a1a" stroke="none" />
    <text x="36" y="42" font-size="20" text-anchor="middle" stroke="none" fill="#fff">💬</text>
    <!-- text -->
    <text x="72" y="36" font-size="14" font-weight="600" stroke="none" fill="#fff">Read SMS</text>
    <text x="72" y="54" font-size="12" stroke="none" fill="#888">Optional · Auto-import bank EMIs</text>
    <!-- toggle OFF -->
    <rect x="294" y="24" width="32" height="20" rx="10" fill="#333" stroke="none" />
    <circle cx="302" cy="34" r="8" fill="#666" stroke="none" />
  </g>

  <!-- permission card 3: Exact Alarms -->
  <g transform="translate(24, 492)">
    <rect width="342" height="76" rx="12" fill="#111" stroke="#222" stroke-width="1" />
    <!-- icon -->
    <rect x="16" y="18" width="40" height="40" rx="8" fill="#1a1a1a" stroke="none" />
    <text x="36" y="42" font-size="20" text-anchor="middle" stroke="none" fill="#fff">⏰</text>
    <!-- text -->
    <text x="72" y="36" font-size="14" font-weight="600" stroke="none" fill="#fff">Exact Alarms</text>
    <text x="72" y="54" font-size="12" stroke="none" fill="#888">Required · Precise reminder timing</text>
    <!-- toggle ON -->
    <rect x="294" y="24" width="32" height="20" rx="10" fill="#fff" stroke="none" />
    <circle cx="316" cy="34" r="8" fill="#000" stroke="none" />
  </g>

  <!-- info note -->
  <rect x="24" y="588" width="342" height="48" rx="8" fill="#111" stroke="#333" stroke-width="1" />
  <text x="36" y="610" font-size="12" stroke="none" fill="#888">ℹ  You can change these any time in</text>
  <text x="36" y="628" font-size="12" stroke="none" fill="#888">   Settings → App permissions.</text>

  <!-- CTA button -->
  <g transform="translate(24, 660)">
    <rect width="342" height="56" rx="12" fill="#fff" stroke="none" />
    <text x="171" y="34" font-size="16" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Continue →</text>
  </g>

  <!-- skip link -->
  <text x="195" y="744" font-size="13" text-anchor="middle" stroke="none" fill="#555">Skip for now</text>

  <!-- annotations -->
  <g>
    <circle cx="360" cy="340" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="360" y="344" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
    <circle cx="360" cy="428" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="360" y="432" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
    <circle cx="360" cy="516" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="360" y="520" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
    <circle cx="360" cy="676" r="12" fill="#000" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
    <text x="360" y="680" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
  </g>
</svg>
