  <rect x="32" y="684" width="9" height="9" rx="2" fill="#4F46E5"/>
  <text x="46" y="693" font-size="10" fill="#64748B">Loan A (SBI)</text>
  <rect x="136" y="684" width="9" height="9" rx="2" fill="#0891B2"/>
  <text x="150" y="693" font-size="10" fill="#64748B">Loan B (HDFC)</text>

  <!-- CTA -->
  <rect x="16" y="706" width="358" height="48" rx="14" fill="#4F46E5"/>
  <text x="195" y="736" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">Choose Loan B — Save ₹4.4L</text>

  <!-- bottom nav -->
