  <text x="195" y="474" font-size="14" font-weight="700" text-anchor="middle" fill="#FFFFFF">Loan B saves you ₹4,41,120</text>
  <text x="195" y="496" font-size="12" text-anchor="middle" fill="#A7F3D0">₹1,731/mo less over 20 years</text>

