<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- canvas: 390x844 · loan comparison calculator -->

  <rect width="390" height="844" fill="#f4f4f4" stroke="none" />

  <!-- status bar -->
  <rect width="390" height="48" fill="#fff" stroke="none" />
  <text x="16" y="32" font-size="12" stroke="none" fill="#000">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#000" stroke-width="1.5" />
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#000" stroke="none" />

  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="#fff" stroke="none" />
  <line x1="0" y1="104" x2="390" y2="104" stroke="#e5e5e0" stroke-width="1" />
  <text x="20" y="84" font-size="20" stroke="none" fill="#000">←</text>
  <text x="195" y="84" font-size="17" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Compare Loans</text>

  <!-- loan A panel -->
  <rect x="8" y="112" width="180" height="236" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <rect x="8" y="112" width="180" height="36" rx="12" fill="#000" stroke="none" />
  <rect x="8" y="136" width="180" height="12" fill="#000" stroke="none" />
  <text x="98" y="135" font-size="13" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Option A</text>
  <!-- fields inside A -->
  <text x="20" y="172" font-size="11" stroke="none" fill="#666">Loan Amount</text>
  <rect x="20" y="178" width="156" height="28" rx="6" fill="#f4f4f4" stroke="#ccc" stroke-width="1" />
  <text x="30" y="197" font-size="13" font-weight="600" stroke="none" fill="#000">₹ 50,00,000</text>

  <text x="20" y="222" font-size="11" stroke="none" fill="#666">Interest Rate</text>
  <rect x="20" y="228" width="156" height="28" rx="6" fill="#f4f4f4" stroke="#ccc" stroke-width="1" />
  <text x="30" y="247" font-size="13" font-weight="600" stroke="none" fill="#000">8.50%</text>

  <text x="20" y="272" font-size="11" stroke="none" fill="#666">Tenure</text>
  <rect x="20" y="278" width="156" height="28" rx="6" fill="#f4f4f4" stroke="#ccc" stroke-width="1" />
  <text x="30" y="297" font-size="13" font-weight="600" stroke="none" fill="#000">20 years</text>

  <!-- A result -->
  <rect x="8" y="312" width="180" height="36" rx="0" fill="#f4f4f4" stroke="none" />
  <line x1="8" y1="312" x2="188" y2="312" stroke="#e5e5e0" stroke-width="1" />
  <text x="98" y="328" font-size="11" text-anchor="middle" stroke="none" fill="#666">Monthly EMI</text>
  <text x="98" y="344" font-size="18" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹ 32,450</text>

  <!-- swap icon in middle -->
  <text x="195" y="240" font-size="20" text-anchor="middle" stroke="none" fill="#666">⇄</text>

  <!-- loan B panel -->
  <rect x="202" y="112" width="180" height="236" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <rect x="202" y="112" width="180" height="36" rx="12" fill="#333" stroke="none" />
  <rect x="202" y="136" width="180" height="12" fill="#333" stroke="none" />
  <text x="292" y="135" font-size="13" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Option B</text>
  <!-- fields inside B -->
  <text x="214" y="172" font-size="11" stroke="none" fill="#666">Loan Amount</text>
  <rect x="214" y="178" width="156" height="28" rx="6" fill="#f4f4f4" stroke="#ccc" stroke-width="1" />
  <text x="224" y="197" font-size="13" font-weight="600" stroke="none" fill="#000">₹ 50,00,000</text>

  <text x="214" y="222" font-size="11" stroke="none" fill="#666">Interest Rate</text>
  <rect x="214" y="228" width="156" height="28" rx="6" fill="#f4f4f4" stroke="#ccc" stroke-width="1" />
  <text x="224" y="247" font-size="13" font-weight="600" stroke="none" fill="#000">8.00%</text>

  <text x="214" y="272" font-size="11" stroke="none" fill="#666">Tenure</text>
  <rect x="214" y="278" width="156" height="28" rx="6" fill="#f4f4f4" stroke="#ccc" stroke-width="1" />
  <text x="224" y="297" font-size="13" font-weight="600" stroke="none" fill="#000">15 years</text>

  <!-- B result -->
  <rect x="202" y="312" width="180" height="36" rx="0" fill="#f4f4f4" stroke="none" />
  <line x1="202" y1="312" x2="382" y2="312" stroke="#e5e5e0" stroke-width="1" />
  <text x="292" y="328" font-size="11" text-anchor="middle" stroke="none" fill="#666">Monthly EMI</text>
  <text x="292" y="344" font-size="18" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹ 35,893</text>

  <!-- compare button -->
  <rect x="16" y="364" width="358" height="52" rx="12" fill="#000" stroke="none" />
  <text x="195" y="396" font-size="15" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Compare Results</text>

  <!-- results comparison card -->
  <rect x="16" y="432" width="358" height="172" rx="12" fill="#fff" stroke="#e5e5e0" stroke-width="1" />
  <text x="36" y="456" font-size="12" font-weight="700" stroke="none" fill="#666">COMPARISON RESULTS</text>
  <!-- table header -->
  <text x="140" y="476" font-size="11" text-anchor="middle" stroke="none" fill="#666">Option A</text>
  <text x="290" y="476" font-size="11" text-anchor="middle" stroke="none" fill="#666">Option B</text>
  <line x1="36" y1="480" x2="362" y2="480" stroke="#f0f0f0" stroke-width="1" />
  <!-- row 1 -->
  <text x="36" y="498" font-size="12" stroke="none" fill="#666">Monthly EMI</text>
  <text x="140" y="498" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹32,450</text>
  <text x="290" y="498" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹35,893</text>
  <!-- row 2 -->
  <text x="36" y="520" font-size="12" stroke="none" fill="#666">Total Payment</text>
  <text x="140" y="520" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹77.9L</text>
  <text x="290" y="520" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹64.6L</text>
  <!-- row 3 -->
  <text x="36" y="542" font-size="12" stroke="none" fill="#666">Total Interest</text>
  <text x="140" y="542" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹27.9L</text>
  <text x="290" y="542" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">₹14.6L</text>
  <!-- row 4 -->
  <text x="36" y="564" font-size="12" stroke="none" fill="#666">Loan Duration</text>
  <text x="140" y="564" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">20 years</text>
  <text x="290" y="564" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#000">15 years</text>
  <!-- winner badge on B column -->
  <rect x="248" y="430" width="48" height="20" rx="10" fill="#000" stroke="none" />
  <text x="272" y="444" font-size="10" font-weight="700" text-anchor="middle" stroke="none" fill="#fff">Better</text>
  <!-- divider column line -->
  <line x1="195" y1="464" x2="195" y2="596" stroke="#e5e5e0" stroke-width="1" />

  <!-- recommendation card -->
  <rect x="16" y="620" width="358" height="80" rx="12" fill="#000" stroke="none" />
  <text x="36" y="646" font-size="13" font-weight="700" stroke="none" fill="#fff">💡  Option B saves ₹13.3L</text>
  <text x="36" y="668" font-size="12" stroke="none" fill="#aaa">Higher monthly EMI (₹3,443 more) but you save</text>
  <text x="36" y="686" font-size="12" stroke="none" fill="#aaa">₹13.3L in total interest and close 5 years earlier.</text>

  <!-- bottom nav bar -->
  <rect x="0" y="796" width="390" height="48" fill="#fff" stroke="none" />
  <line x1="0" y1="796" x2="390" y2="796" stroke="#e5e5e0" stroke-width="1" />
  <text x="55" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Dashboard</text>
  <g transform="translate(183, 808)">
    <rect x="-24" y="-4" width="48" height="32" rx="8" fill="#000" stroke="none" />
    <text x="0" y="18" font-size="11" text-anchor="middle" stroke="none" fill="#fff">Calculator</text>
  </g>
  <text x="335" y="826" font-size="11" text-anchor="middle" stroke="none" fill="#666">Reminders</text>

  <!-- annotations -->
  <circle cx="25" cy="232" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="25" y="236" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text>
  <circle cx="365" cy="396" r="12" fill="#000" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="400" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text>
  <circle cx="365" cy="520" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="524" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text>
  <circle cx="365" cy="660" r="12" fill="#000" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5" />
  <text x="365" y="664" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text>
</svg>
