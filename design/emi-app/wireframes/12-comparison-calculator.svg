  <rect x="208" y="614" width="30" height="46" rx="4" fill="#4F46E5"/>
  <text x="223" y="676" font-size="9" text-anchor="middle" fill="#94A3B8">Yr 10</text>
  <rect x="286" y="628" width="30" height="32" rx="4" fill="#4F46E5"/>
  <text x="301" y="676" font-size="9" text-anchor="middle" fill="#94A3B8">Yr 20</text>
  <!-- B bars (teal, slightly shorter) -->
  <rect x="84" y="598" width="30" height="62" rx="4" fill="#0891B2"/>
  <rect x="162" y="608" width="30" height="52" rx="4" fill="#0891B2"/>
  <rect x="240" y="622" width="30" height="38" rx="4" fill="#0891B2"/>
  <rect x="318" y="636" width="30" height="24" rx="4" fill="#0891B2"/>
