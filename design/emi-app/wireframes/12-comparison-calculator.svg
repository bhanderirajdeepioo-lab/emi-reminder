  <text x="32" y="220" font-size="16" font-weight="700" fill="#FFFFFF">8.5%  20 yr</text>
  <text x="145" y="220" font-size="11" fill="#A5B4FC">✏</text>

  <!-- Loan B input -->
  <rect x="202" y="116" width="172" height="130" rx="16" fill="url(#loanB)"/>
  <text x="218" y="140" font-size="12" font-weight="700" fill="#BAE6FD">Loan B (HDFC)</text>
  <text x="218" y="164" font-size="11" fill="#7DD3FC">Amount</text>
  <text x="218" y="184" font-size="16" font-weight="700" fill="#FFFFFF">₹50,00,000</text>
  <text x="218" y="202" font-size="11" fill="#7DD3FC">Rate</text>
