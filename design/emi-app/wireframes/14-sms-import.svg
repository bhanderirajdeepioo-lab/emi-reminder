<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- background — reminders list dimmed -->
  <rect width="390" height="844" fill="#EEF2FF"/>
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)" opacity="0.5"/>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF" opacity="0.6">Reminders</text>
  <!-- scrim -->
  <rect width="390" height="844" fill="#0F172A" opacity="0.6"/>

  <!-- bottom sheet -->
  <rect x="0" y="200" width="390" height="644" rx="24" fill="#FFFFFF"/>
  <!-- drag handle -->
  <rect x="171" y="212" width="48" height="4" rx="2" fill="#CBD5E1"/>

  <!-- title -->
  <rect x="24" y="232" width="44" height="44" rx="12" fill="#EEF2FF"/>
  <text x="46" y="259" font-size="24" text-anchor="middle">💬</text>
  <text x="80" y="248" font-size="17" font-weight="700" fill="#1E293B">SMS Auto-Import</text>
  <text x="80" y="268" font-size="12" fill="#64748B">3 EMI transactions detected</text>
  <circle cx="358" cy="248" r="16" fill="#EEF2FF"/>
  <text x="358" y="253" font-size="14" text-anchor="middle" fill="#64748B">✕</text>

  <!-- SMS card 1 — matched -->
  <rect x="16" y="284" width="358" height="100" rx="14" fill="#EEF2FF"/>
  <rect x="16" y="284" width="5" height="100" rx="2.5" fill="#4F46E5"/>
  <text x="32" y="308" font-size="11" font-weight="600" fill="#4F46E5">HDFC BANK · 28 Jun</text>
  <text x="32" y="328" font-size="12" fill="#1E293B" font-style="italic">"Your EMI of Rs.10,941 for Loan</text>
  <text x="32" y="346" font-size="12" fill="#1E293B" font-style="italic">A/C XXXXXX4821 has been debited"</text>
  <!-- extracted fields -->
  <rect x="32" y="360" width="80" height="20" rx="10" fill="#E0E7FF"/>
  <text x="72" y="374" font-size="11" text-anchor="middle" fill="#4F46E5">₹10,941</text>
  <rect x="120" y="360" width="100" height="20" rx="10" fill="#E0E7FF"/>
  <text x="170" y="374" font-size="11" text-anchor="middle" fill="#4F46E5">Car Loan</text>
  <rect x="230" y="360" width="120" height="20" rx="10" fill="#E0E7FF"/>
  <text x="290" y="374" font-size="11" text-anchor="middle" fill="#4F46E5">XXXXXX4821</text>
  <!-- import toggle -->
  <rect x="324" y="290" width="44" height="24" rx="12" fill="#4F46E5"/>
  <circle cx="358" cy="302" r="10" fill="#FFFFFF"/>

  <!-- SMS card 2 — matched -->
  <rect x="16" y="396" width="358" height="100" rx="14" fill="#EEF2FF"/>
  <rect x="16" y="396" width="5" height="100" rx="2.5" fill="#059669"/>
  <text x="32" y="420" font-size="11" font-weight="600" fill="#059669">SBI BANK · 25 Jun</text>
  <text x="32" y="440" font-size="12" fill="#1E293B" font-style="italic">"Dear Customer, your Home Loan EMI</text>
  <text x="32" y="458" font-size="12" fill="#1E293B" font-style="italic">of Rs.32,450 is debited on 25/06"</text>
  <rect x="32" y="472" width="80" height="20" rx="10" fill="#DCFCE7"/>
  <text x="72" y="486" font-size="11" text-anchor="middle" fill="#059669">₹32,450</text>
  <rect x="120" y="472" width="100" height="20" rx="10" fill="#DCFCE7"/>
  <text x="170" y="486" font-size="11" text-anchor="middle" fill="#059669">Home Loan</text>
  <rect x="324" y="402" width="44" height="24" rx="12" fill="#059669"/>
  <circle cx="358" cy="414" r="10" fill="#FFFFFF"/>

  <!-- SMS card 3 — uncertain -->
  <rect x="16" y="508" width="358" height="100" rx="14" fill="#FFFBEB"/>
  <rect x="16" y="508" width="5" height="100" rx="2.5" fill="#D97706"/>
  <text x="32" y="532" font-size="11" font-weight="600" fill="#D97706">ICICI BANK · 20 Jun ⚠ uncertain</text>
  <text x="32" y="552" font-size="12" fill="#1E293B" font-style="italic">"Rs.8500 debited from a/c towards</text>
  <text x="32" y="570" font-size="12" fill="#1E293B" font-style="italic">loan repayment ref XXXX3210"</text>
  <rect x="32" y="584" width="80" height="20" rx="10" fill="#FEF3C7"/>
  <text x="72" y="598" font-size="11" text-anchor="middle" fill="#D97706">₹8,500</text>
  <rect x="120" y="584" width="120" height="20" rx="10" fill="#FEF3C7"/>
  <text x="180" y="598" font-size="11" text-anchor="middle" fill="#D97706">Confirm type ›</text>
  <rect x="324" y="514" width="44" height="24" rx="12" fill="#E2E8F0"/>
  <circle cx="336" cy="526" r="10" fill="#FFFFFF"/>

  <!-- action row -->
  <rect x="16" y="620" width="172" height="48" rx="14" fill="#EEF2FF"/>
  <text x="102" y="650" font-size="13" font-weight="700" text-anchor="middle" fill="#4F46E5">Skip</text>
  <rect x="202" y="620" width="172" height="48" rx="14" fill="#4F46E5"/>
  <text x="288" y="650" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">Import Selected (2)</text>

  <!-- info text -->
  <text x="195" y="690" font-size="11" text-anchor="middle" fill="#94A3B8">Imported EMIs are saved as paid reminders</text>
  <text x="195" y="708" font-size="11" text-anchor="middle" fill="#94A3B8">SMS data never leaves your device</text>
</svg>
