<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844"
     font-family="-apple-system, system-ui, sans-serif" stroke="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="slider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="areaInv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="#EEF2FF"/>

  <!-- status bar -->
  <rect width="390" height="48" fill="#4F46E5"/>
  <text x="16" y="32" font-size="12" fill="#C7D2FE">9:41</text>
  <rect x="340" y="16" width="36" height="16" rx="3" fill="none" stroke="#C7D2FE" stroke-width="1.5"/>
  <rect x="342" y="19" width="24" height="10" rx="1" fill="#C7D2FE"/>

  <!-- header -->
  <rect x="0" y="48" width="390" height="56" fill="url(#hdr)"/>
  <text x="20" y="84" font-size="20" fill="#FFFFFF">←</text>
  <text x="195" y="84" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF">SIP Calculator</text>

  <!-- tabs -->
  <rect x="16" y="116" width="358" height="38" rx="10" fill="#312E81"/>
  <rect x="18" y="118" width="116" height="34" rx="8" fill="#FFFFFF"/>
  <text x="76" y="139" font-size="13" font-weight="700" text-anchor="middle" fill="#4F46E5">Regular SIP</text>
  <text x="207" y="139" font-size="13" text-anchor="middle" fill="#A5B4FC">Step-up SIP</text>
  <text x="326" y="139" font-size="13" text-anchor="middle" fill="#A5B4FC">Lump Sum</text>

  <!-- Monthly SIP Amount -->
  <rect x="16" y="166" width="358" height="80" rx="14" fill="#FFFFFF"/>
  <text x="32" y="188" font-size="11" fill="#64748B">Monthly SIP Amount</text>
  <text x="32" y="222" font-size="28" font-weight="800" fill="#1E293B">₹ 10,000</text>
  <rect x="32" y="234" width="322" height="5" rx="2.5" fill="#E0E7FF"/>
  <rect x="32" y="234" width="130" height="5" rx="2.5" fill="url(#slider)"/>
  <circle cx="162" cy="236" r="9" fill="#4F46E5" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Expected Return + Tenure -->
  <rect x="16" y="258" width="172" height="72" rx="14" fill="#FFFFFF"/>
  <text x="32" y="278" font-size="11" fill="#64748B">Expected Return (% p.a.)</text>
  <rect x="32" y="287" width="32" height="28" rx="8" fill="#EEF2FF"/>
  <text x="48" y="306" font-size="16" text-anchor="middle" fill="#4F46E5">−</text>
  <text x="104" y="308" font-size="20" font-weight="800" text-anchor="middle" fill="#1E293B">12</text>
  <rect x="148" y="287" width="32" height="28" rx="8" fill="#EEF2FF"/>
  <text x="164" y="306" font-size="16" text-anchor="middle" fill="#4F46E5">+</text>

  <rect x="202" y="258" width="172" height="72" rx="14" fill="#FFFFFF"/>
  <text x="218" y="278" font-size="11" fill="#64748B">Investment Period</text>
  <text x="218" y="308" font-size="20" font-weight="700" fill="#1E293B">15 Years</text>
  <text x="304" y="308" font-size="13" fill="#94A3B8">(180 mo)</text>

  <!-- RESULTS hero -->
  <rect x="16" y="342" width="358" height="80" rx="16" fill="#1E293B"/>
  <text x="32" y="366" font-size="12" fill="#94A3B8">Total Wealth Gained</text>
  <text x="32" y="402" font-size="30" font-weight="800" fill="#34D399">₹ 50,45,760</text>
  <text x="254" y="370" font-size="11" fill="#64748B">Returns</text>
  <text x="254" y="392" font-size="16" font-weight="800" fill="#A5B4FC">₹ 32,45,760</text>
  <text x="254" y="410" font-size="11" fill="#94A3B8">on ₹18L invested</text>

  <!-- Breakdown cards -->
  <rect x="16" y="434" width="108" height="68" rx="14" fill="#FFFFFF"/>
  <text x="70" y="454" font-size="10" text-anchor="middle" fill="#64748B">Invested</text>
  <text x="70" y="488" font-size="16" font-weight="700" text-anchor="middle" fill="#4F46E5">₹18,00,000</text>

  <rect x="141" y="434" width="108" height="68" rx="14" fill="#FFFFFF"/>
  <text x="195" y="454" font-size="10" text-anchor="middle" fill="#64748B">Returns</text>
  <text x="195" y="488" font-size="16" font-weight="700" text-anchor="middle" fill="#059669">₹32,45,760</text>

  <rect x="266" y="434" width="108" height="68" rx="14" fill="#FFFFFF"/>
  <text x="320" y="454" font-size="10" text-anchor="middle" fill="#64748B">Returns %</text>
  <text x="320" y="488" font-size="16" font-weight="700" text-anchor="middle" fill="#34D399">180%</text>

  <!-- Wealth growth chart -->
  <rect x="16" y="514" width="358" height="180" rx="16" fill="#FFFFFF"/>
  <text x="32" y="538" font-size="13" font-weight="700" fill="#1E293B">Wealth Growth Projection</text>
  <!-- area fills -->
  <path d="M32,650 L32,640 C80,630 140,610 200,578 C260,546 320,522 362,510 L362,650 Z"
        fill="url(#areaGrad)"/>
  <path d="M32,650 L32,642 C80,636 140,622 200,604 C260,586 320,570 362,562 L362,650 Z"
        fill="url(#areaInv)"/>
  <!-- wealth line -->
  <path d="M32,640 C80,630 140,610 200,578 C260,546 320,522 362,510"
        fill="none" stroke="#059669" stroke-width="2"/>
  <!-- invested line -->
  <path d="M32,642 C80,636 140,622 200,604 C260,586 320,570 362,562"
        fill="none" stroke="#4F46E5" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- x-axis labels -->
  <line x1="32" y1="652" x2="362" y2="652" stroke="#E2E8F0" stroke-width="1"/>
  <text x="32" y="668" font-size="9" fill="#94A3B8">Yr 1</text>
  <text x="100" y="668" font-size="9" fill="#94A3B8">Yr 3</text>
  <text x="180" y="668" font-size="9" fill="#94A3B8">Yr 7</text>
  <text x="260" y="668" font-size="9" fill="#94A3B8">Yr 12</text>
  <text x="340" y="668" font-size="9" fill="#94A3B8">Yr 15</text>
  <!-- legend -->
  <rect x="32" y="676" width="40" height="2" fill="#059669"/>
  <text x="78" y="680" font-size="10" fill="#64748B">Total wealth</text>
  <rect x="152" y="676" width="40" height="2" fill="#4F46E5"/>
  <text x="198" y="680" font-size="10" fill="#64748B">Amount invested</text>

  <!-- step-up prompt -->
  <rect x="16" y="706" width="358" height="44" rx="14" fill="#F0FDF4"/>
  <text x="32" y="728" font-size="13" fill="#065F46">💡 Step up by 10%/yr →  Wealth becomes </text>
  <text x="32" y="742" font-size="13" font-weight="700" fill="#059669">₹81,30,000</text>

  <!-- CTA -->
  <rect x="16" y="762" width="358" height="24" rx="8" fill="none"/>
  <!-- bottom nav -->
  <rect x="0" y="796" width="390" height="48" fill="#FFFFFF"/>
  <rect x="0" y="796" width="390" height="1" fill="#E2E8F0"/>
  <text x="66" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Home</text>
  <rect x="153" y="802" width="84" height="34" rx="17" fill="#EEF2FF"/>
  <text x="195" y="824" font-size="11" font-weight="700" text-anchor="middle" fill="#4F46E5">Tools</text>
  <text x="324" y="824" font-size="11" text-anchor="middle" fill="#94A3B8">Reminders</text>

  <!-- annotations -->
  <circle cx="374" cy="380" r="12" fill="#1E293B" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="374" y="384" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">1</text>
  <circle cx="374" cy="600" r="12" fill="#FFFFFF" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="374" y="604" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">2</text>
  <circle cx="374" cy="724" r="12" fill="#F0FDF4" stroke="#d33" stroke-dasharray="4 2" stroke-width="1.5"/>
  <text x="374" y="728" font-size="12" font-weight="700" text-anchor="middle" fill="#d33">3</text>
</svg>
